var LAYER_DESC={
  mgmt:"Management Plane — уровень управления и мониторинга.\n\nОтвечает за всё взаимодействие администратора и внешних систем с NGFW. Включает:\n\n• Веб-интерфейс администратора (Nginx + aiohttp) — полнофункциональная панель управления с ролевой моделью доступа (суперадмин, МСЭ-администратор, ИБ-администратор, аудитор). Поддерживает 2FA через TOTP, SMS и Multifactor.\n\n• Личный кабинет пользователя — портал самообслуживания для конечных пользователей: смена пароля, просмотр статистики, скачивание VPN-профилей.\n\n• REST API (OpenAPI) — программный интерфейс для интеграции с SIEM/SOAR-системами.\n\n• Мониторинг — сбор метрик CPU/RAM/диск/сеть в ClickHouse, интеграция с Zabbix, SNMP v2c/v3.\n\n• Движок отчётов — конструктор отчётов с агрегацией из ClickHouse.\n\n• Аудит — фиксация всех действий администраторов.",
  ctrl:"Control Plane — уровень конфигурации и политик безопасности.\n\nЦентральный уровень бизнес-логики NGFW. Каждый бэкенд этого уровня:\n1) Принимает конфигурацию от Management Plane через etcd\n2) Валидирует и трансформирует правила\n3) Записывает результат в etcd (PERMANENT / RUNTIME)\n4) Daemon'ы подхватывают изменения через etcd watch\n\nОсновные домены: Аутентификация, Межсетевой экран, Сетевые сервисы, Безопасность, VPN, Маршрутизация.",
  data:"Data Plane — уровень обработки сетевого трафика.\n\nВысокопроизводительные компоненты на C/C++.\n\nАрхитектура обработки пакета:\n1) VPP/DPDK → 2) eBPF ACL (XDP) → 3) VPP graph nodes → 4) NFQUEUE → Suricata IPS → 5) eCAP-модули в Squid → 6) DPI L7 (nDPI)",
  infra:"Infrastructure — инфраструктурный и системный уровень.\n\nФундамент: ядро системы, лицензирование, бэкапы, обновления, кластеризация (HA Active-Passive), VCE (виртуальные контексты).\n\nХранилища: etcd (конфигурация), ClickHouse (логи), SQLite (кэш), RocksDB (URL-категории).",
  daemon:"System Daemons — уровень системных служб.\n\nРеальные процессы ОС: обработка трафика, DNS, VPN, маршрутизация и т.д.\n\nБэкенды записывают конфигурацию в etcd, daemon'ы получают и применяют.",
};
