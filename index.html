var LAYER_DESC={
  mgmt:"Уровень управления и наблюдаемости.\n\nЕдинственная точка взаимодействия администратора и внешних систем с NGFW. Компоненты Management Plane не участвуют в обработке сетевого трафика — читают конфигурацию из etcd, записывают изменения обратно в etcd, визуализируют аналитику из ClickHouse.\n\nВключает:\n— Веб-интерфейс администратора с ролевой моделью и 2FA\n— Личный кабинет пользователя\n— REST API на основе OpenAPI\n— Мониторинг состояния сервера\n— Отчёты и журналы\n— Аудит действий администраторов",
  ctrl:"Уровень конфигурации и бизнес-логики.\n\nОпределяет правила игры: что фильтровать, кого пускать, куда маршрутизировать. Бэкенды принимают настройки от Management Plane, проверяют корректность и записывают в etcd. Data Plane наблюдает за изменениями в etcd через watch и автоматически применяет конфигурацию.\n\nНе обрабатывает трафик напрямую.",
  data:"Уровень обработки трафика.\n\nКаждый пакет, проходящий через NGFW, обрабатывается здесь. Включает daemon'ы ОС (Suricata, Squid, Unbound, strongSwan, FRRouting) и высокопроизводительные C/C++ компоненты (VPP, eBPF, eCAP, nDPI).\n\nТри стадии:\n1. Предварительная — аппаратная фильтрация, eBPF/XDP, QoS\n2. Межсетевой экран — DNAT, INPUT, FORWARD, IPS, DPI\n3. Завершающая — SNAT, VPN-шифрование, отправка",
  infra:"Инфраструктурный уровень — фундамент системы.\n\nОбеспечивает работу всего остального: базовые настройки сервера, лицензирование, обновления, резервное копирование, сертификаты, виртуальные контексты (VCE), кластеризацию и хранилища данных."
};

var DOM_DESC={
  ui:"Основной интерфейс для работы с NGFW.\n\nВеб-интерфейс администратора (web-backend) — полная панель управления. Ролевая модель: суперадминистратор, администратор МСЭ, администратор ИБ, аудитор. 2FA: TOTP, SMS, Multifactor. Технически: Nginx + aiohttp.\n\nЛичный кабинет пользователя (user-cabinet-backend) — портал самообслуживания: смена пароля, статистика трафика, скачивание VPN-профилей, SSL VPN портал.",
  rpt:"Программный интерфейс и наблюдаемость.\n\nREST API (rest-api-backend) — OpenAPI, покрывает все функции NGFW. Сценарии: SIEM, SOAR, DevOps/IaC (Terraform, Ansible). API-ключи, rate limiting.\n\nМониторинг (monitor-backend) — CPU, RAM, диски, интерфейсы. Zabbix-agent, SNMP v2c/v3. Healthcheck всех сервисов.",
  api_d:"Аналитика, журналирование и аудит.\n\nОтчёты (reports-backend) — конструктор отчётов из ClickHouse. Журнал МСЭ, веб-трафик, IPS-алерты, DPI, загруженность каналов. Экспорт CSV/PDF, рассылка по расписанию.\n\nАудит (audit-backend) — нередактируемый лог действий администраторов. Diff «было→стало» в JSON. TTL 365 дней. ФСТЭК/ФСБ.\n\nЖурналы (logs-backend) — systemd journal → ClickHouse. Syslog RFC 5424, CEF для SIEM.",
  auth_c:"Идентификация пользователей.\n\nАвторизация — обязательное условие для доступа в интернет (не нужна для работы внутри LAN). Сессия привязана к IP.\n\nauth-backend: captive portal, SSO, Ideco Client, IP/MAC, подсеть, 2FA.\nad-backend: LDAP/LDAPS, Kerberos SSO, NTLM, SQLite-кэш.\nald-backend: ALD Pro, FreeIPA.\nuser-backend: локальные учётки, SQLite, bcrypt.\nweb-authd: captive portal daemon, iptables REDIRECT.",
  fw_c:"Управление правилами фильтрации трафика.\n\nfirewall-backend: stateful inspection, таблицы FORWARD/INPUT/DNAT/SNAT, профили безопасности (DPI, IPS), зоны.\nalias-backend: объектная модель (38+ типов). IP, FQDN, сервисы, расписания, зоны AD/ALD. alias-lib импортируют 30+ бэкендов.\nacl-backend: трансляция правил МСЭ в eBPF maps или VPP ACL plugin.\nvpp-backend: конфигурация VPP через Python API.",
  net_c:"Сетевые сервисы.\n\nl2-manager: Ethernet, VLAN 802.1Q, Bond (LACP), Bridge. KNI-интерфейсы для VPP.\ndns-backend: Unbound — рекурсивный резолвер, форвардер, DoH, DNSSEC.\ndhcp-server-backend: пулы адресов, резервирование по MAC, DHCP relay.\nnetscan-backend: ARP-сканирование, OS fingerprinting.",
  sec_c:"Конфигурация модулей безопасности.\n\ncontent-filter-backend: 145 категорий URL (RocksDB), морфологические словари, Safe Search.\nsuricata-backend: IPS-профили, ET Open/Pro, Snort-совместимые сигнатуры.\nav-backend: ClamAV / Kaspersky SDK.\nwaf-backend: ModSecurity + OWASP CRS.\nproxy-backend: Squid TPROXY/SSL Bump.\nreverse-backend: Nginx обратный прокси, Let's Encrypt.",
  vpn_c:"VPN-подключения.\n\nvpn-servers-backend: IKEv2/IPSec, L2TP/IPSec, SSTP. Автогенерация профилей.\nipsec-backend: IPSec site-to-site. IKEv1/v2, DPD, PFS, NAT-T.\ngost-vpn-backend: ГОСТ Р 34.12-2015, Кузнечик/Магма.\nagent-backend: Ideco Client, push-профили.\nwireguard-backend: WireGuard, QR-коды.",
  rt_c:"Маршрутизация и почта.\n\nrouting-backend: FRRouting — PBR, статика, BGP, OSPF, балансировка каналов.\nmail-backend: Postfix SMTP relay, DKIM, SPF, TLS.",
  dp_core:"Ядро DP.\n\nVPP: userspace сетевой стек, DPDK/AF_XDP, обработка пачками (vectors). Конфигурация через vpp-backend → etcd.\nUnbound: DNS daemon. Конфигурация через dns-backend → etcd.\nISC DHCP: DHCP daemon. Конфигурация через dhcp-server-backend → etcd.",
  dp_ips:"IPS, прокси, WAF.\n\nSuricata: IPS inline (NFQUEUE), ET rules, Drop/Alert → ClickHouse.\nSquid: HTTP/S прокси (TPROXY), SSL Bump, платформа для eCAP.\necap-av: антивирус in-process (ClamAV/Kaspersky через Unix socket).\necap-urls: URL lookup в RocksDB, in-process.\nModSecurity: WAF в связке с Nginx.",
  dp_dpi:"DPI и статистика.\n\napp-control-nfq: nDPI, 300+ приложений, NFQUEUE.\nflow-stat-server: приём flow-данных от DPI, ring buffer.\nflow-stat-exporter: batch-вставки в ClickHouse (clickhouse-cpp).\ntrafmond: conntrack, обогащение DNS.",
  dp_acl:"ACL, маршрутизация, VPN, HA.\n\nbpf-acl-rules: eBPF/XDP до сетевого стека, eBPF maps.\nideco-nflog: NFLOG → ClickHouse (libnetfilter_log).\nstrongSwan: charon, IKEv2/L2TP, site-to-site.\nFRRouting: zebra, bgpd, ospfd.\nkeepalived: VRRP, Active-Passive heartbeat."
};

var LINK_DESC={"alias":"Объекты","auth":"Аутент.","cert":"Серт.","cluster":"Кластер","license":"Лицензии","vce":"VCE","system":"Системные","firewall":"Правила МСЭ","routing":"Маршруты","l2manager":"Интерфейсы","proxy":"Прокси","content-filter":"URL","av":"AV","reports":"Отчёты","alerts":"Алерты","inet-access":"Доступ","ad-users":"AD","sessions":"Сессии","vpn-servers":"VPN","agent":"Client","ipsec":"IPSec","gost-vpn":"ГОСТ","dhcp-server":"DHCP","suricata":"IPS","waf":"WAF","servers":"Серверы","vpn-authd":"VPN auth","vpp":"VPP"};
var DB_LINK_DESC={
  db_perm:"etcd PERMANENT — постоянная конфигурация NGFW.\n\nХранит правила МСЭ, объекты alias, настройки всех модулей, учётные записи. Сохраняется при перезагрузке.\n\nВсе Python-бэкенды подключены через общий Backend class. Основной паттерн: write → watch → react. Через etcd бэкенды общаются между собой без прямых API-вызовов.",
  db_run:"etcd RUNTIME — оперативные данные.\n\nПересоздаётся при каждом старте. Хранит текущее состояние: link up/down, скорость интерфейсов, MTU, активные сессии авторизации, статусы бэкендов, текущие VPN-соединения.\n\nИспользуется для отображения реального состояния системы в веб-интерфейсе.",
  db_ch:"ClickHouse — колоночная СУБД для аналитики и логов.\n\nХранит: журнал МСЭ (accept/drop), DNS-запросы, IPS-алерты, WAF-события, DPI-статистику по приложениям, веб-трафик по пользователям.\n\n14+ бэкендов пишут данные. reports-backend читает для построения отчётов. TTL и Materialized Views для быстрой агрегации.",
  db_sq_ad:"SQLite: AD cache — кэш пользователей и групп Active Directory.\n\nПозволяет аутентифицировать пользователей при недоступности контроллера домена. Обновляется инкрементально по USN Changed.",
  db_sq_usr:"SQLite: Users — локальные учётные записи.\n\nПользователи и группы, не связанные с AD/ALD. Пароли хранятся в bcrypt. Квоты трафика.",
  db_sq_ips:"SQLite: IPS rules — пользовательские правила IPS.\n\nSnort-совместимые сигнатуры, созданные администратором вручную в suricata-backend. Загружаются Suricata наравне с ET Open/Pro.",
  db_rk:"RocksDB — база URL-категорий контент-фильтра.\n\n145 категорий, миллионы URL. Lookup за микросекунды — критично для inline-фильтрации в eCAP-модуле Squid.\n\nОбновляется из облака Ideco по подписке. Используется ecap-urls (C++) и cf-backend (Python)."
};

var SCENARIOS=[
  {id:"sc_auth",name:"Авторизация пользователя",steps:[
    {comp:"webauthd",label:"1. Перехват HTTP",desc:"iptables REDIRECT перехватывает HTTP-трафик неавторизованного пользователя. web-authd отправляет HTTP 302 на страницу captive portal.\n\nПротокол: iptables REDIRECT → HTTP 302"},
    {comp:"auth",label:"2. Аутентификация",desc:"Пользователь вводит логин/пароль. auth-backend проверяет метод: веб-форма, SSO Kerberos, IP/MAC, Ideco Client.\n\nПротокол: HTTP POST → auth-backend (aiohttp)"},
    {comp:"ad",label:"3. Проверка в AD",desc:"ad-backend проверяет учётные данные через LDAP/LDAPS. При недоступности AD — использует SQLite-кэш.\n\nПротокол: LDAP/LDAPS 389/636 → контроллер домена"},
    {comp:"db_sq_ad",label:"4. SQLite кэш",desc:"Кэш пользователей и групп AD. При недоступности DC аутентификация проходит по кэшированным данным.\n\nТип: файловая БД SQLite (ad-backend)"},
    {comp:"db_run",label:"5. Сессия в etcd",desc:"После успешной аутентификации auth-backend создаёт запись в etcd RUNTIME: IP ↔ пользователь ↔ группы. Сессия видна всем компонентам.\n\nПротокол: etcd put (gRPC)"},

    {comp:"acl",label:"7. Загрузка ACL",desc:"acl-backend транслирует правила в eBPF maps (классический) или VPP ACL plugin (VPP). С этого момента пакеты пользователя пропускаются на уровне данных.\n\nПротокол: bpf() syscall / VPP API"}

    {comp:"squid_dp",label:"2. Squid принимает",desc:"Squid в прозрачном режиме. Для HTTPS выполняет SSL Bump — расшифровывает TLS, чтобы получить полный URL.\n\nПротокол: HTTP CONNECT / SSL Bump (TLS MITM)"},

    {comp:"db_rk",label:"4. RocksDB lookup",desc:"145 категорий, миллионы URL. Lookup за микросекунды: URL/домен → ID категории.\n\nТип: embedded RocksDB key-value store"},
    {comp:"cf",label:"5. Проверка профиля",desc:"content-filter-backend хранит настройки: какие категории запрещены для каких групп пользователей.\n\nПротокол: etcd read (PERMANENT)"},

  {id:"sc_ips",name:"IPS — обнаружение атаки",steps:[

    {comp:"suricata_dp",label:"2. Suricata инспектирует",desc:"Suricata получает пакет из NFQUEUE и проверяет по сигнатурам ET Open/Pro. Анализирует каждый пакет в рамках соединения (в отличие от МСЭ).\n\nПротокол: NFQUEUE → libnetfilter_queue"},
    {comp:"suricata_be",label:"3. Профили из etcd",desc:"suricata-backend хранит конфигурацию IPS-профилей в etcd. Suricata читает при старте и при изменении через etcd watch.\n\nПротокол: etcd watch/get (gRPC)"},
    {comp:"db_sq_ips",label:"4. Пользовательские правила",desc:"Кастомные Snort-совместимые сигнатуры хранятся в SQLite. Suricata загружает их наравне с ET-правилами.\n\nТип: SQLite (suricata-backend)"},
    {comp:"suricata_dp",label:"5. Вердикт Drop/Alert",desc:"При совпадении сигнатуры: Drop — NF_DROP (пакет заблокирован), Alert — NF_ACCEPT (пакет пропущен, событие зафиксировано).\n\nПротокол: NFQUEUE verdict NF_DROP / NF_ACCEPT"},
    {comp:"db_ch",label:"6. Алерт → ClickHouse",desc:"IPS-алерт (сигнатура, severity, src/dst, timestamp) записывается в ClickHouse.\n\nПротокол: clickhouse-driver TCP, batch insert"},
    {comp:"reports",label:"7. Отчёт в UI",desc:"reports-backend читает алерты из ClickHouse и строит отчёт. Администратор видит атаки в веб-интерфейсе.\n\nПротокол: ClickHouse SQL → HTTP JSON → браузер"}
  ]},
  {id:"sc_vpn",name:"VPN IKEv2 подключение",steps:[
    {comp:"strongswan_dp",label:"1. IKE_SA_INIT",desc:"Клиент инициирует IKEv2 handshake. strongSwan (charon) выполняет Diffie-Hellman обмен.\n\nПротокол: IKEv2 (UDP 500 / UDP 4500 за NAT)"},
    {comp:"vpnauthd",label:"2. Аутентификация",desc:"strongSwan вызывает vpn-authd через xauth/EAP plugin для проверки логина/пароля.\n\nПротокол: xauth / EAP-MSCHAPv2"},
    {comp:"auth",label:"3. Проверка через auth",desc:"vpn-authd обращается к auth-backend. Проверка учётных данных (локальные, AD, RADIUS), 2FA если настроено.\n\nПротокол: HTTP internal API (aiohttp)"},
    {comp:"vpnsrv",label:"4. VPN конфигурация",desc:"vpn-servers-backend предоставляет параметры: пул IP, маршруты для клиента, DNS-серверы.\n\nПротокол: etcd read (PERMANENT)"},
    {comp:"db_perm",label:"5. Данные из etcd",desc:"strongSwan читает конфигурацию туннелей (IKE proposals, DH groups, шифрование) из etcd при старте и при изменении.\n\nПротокол: etcd watch/get (gRPC)"},
    {comp:"strongswan_dp",label:"6. CHILD_SA установлен",desc:"После аутентификации устанавливается CHILD_SA — IPSec SA для шифрования трафика. Клиент получает IP из пула.\n\nПротокол: IKEv2 CREATE_CHILD_SA → ESP (IP proto 50)"},
    {comp:"db_run",label:"7. Сессия в RUNTIME",desc:"Активное VPN-соединение записывается в etcd RUNTIME. Веб-интерфейс показывает подключённых пользователей.\n\nПротокол: etcd put (gRPC)"}
  ]},
  {id:"sc_rule",name:"Изменение правила МСЭ",steps:[
    {comp:"web",label:"1. Создание в UI",desc:"Администратор создаёт правило в веб-интерфейсе. web-backend валидирует данные.\n\nПротокол: HTTP POST → Nginx → web-backend (aiohttp)"},
    {comp:"fw",label:"2. Валидация",desc:"firewall-backend проверяет объекты alias и привязанные профили безопасности (DPI, IPS).\n\nПротокол: etcd read (PERMANENT)"},
    {comp:"db_perm",label:"3. Запись в etcd",desc:"Правило сохраняется в etcd PERMANENT. Атомарная операция. Все подписчики (watch) мгновенно уведомляются.\n\nПротокол: etcd put (gRPC, MVCC транзакция)"},
    {comp:"acl",label:"4. ACL watch → реакция",desc:"acl-backend через etcd watch получает событие, разворачивает alias-объекты в конкретные IP, пересчитывает ACL.\n\nПротокол: etcd watch stream (gRPC)"},
    {comp:"bpf",label:"5. Загрузка в eBPF",desc:"acl-backend загружает новые ACL в eBPF maps (hash map / LPM trie). eBPF в драйвере NIC немедленно применяет правила.\n\nПротокол: bpf() syscall → eBPF maps"},
    {comp:"nflog",label:"6. NFLOG → ClickHouse",desc:"Новое правило начинает фиксировать события. ideco-nflog перехватывает accept/drop через libnetfilter_log → ClickHouse.\n\nПротокол: NFLOG netlink → libnetfilter_log → ClickHouse TCP"},
    {comp:"audit",label:"7. Запись в аудит",desc:"audit-backend фиксирует: кто, когда, что изменил (diff «было → стало» JSON). ClickHouse, TTL 365 дней.\n\nПротокол: etcd watch → ClickHouse insert"}
  ]}
];

var C=[
  {id:"web",n:"web-backend",s:"Веб-интерфейс",dom:"ui",sk:"both",lang:"Python",fw:"aiohttp",desc:"Веб-интерфейс администратора NGFW.\n\nNginx (статика, проксирование) + aiohttp (async API). Полное управление всеми модулями.\n\nРолевая модель: суперадминистратор, администратор МСЭ, администратор ИБ, аудитор.\n\n2FA: TOTP, SMS Aero, Multifactor. Telegram-бот: push-уведомления об IPS-алертах, падении каналов, изменениях конфигурации.",det:["Nginx+aiohttp","2FA","Telegram"]},
  {id:"cabinet",n:"user-cabinet-backend",s:"Личный кабинет",dom:"ui",sk:"both",lang:"Python",fw:"aiohttp",desc:"Личный кабинет пользователя.\n\nСмена пароля, статистика трафика, скачивание VPN-профилей (.ovpn, .mobileconfig, .conf).\n\nSSL VPN портал: доступ к внутренним веб-ресурсам без VPN-клиента.",det:["VPN-профили","SSL VPN"]},
  {id:"restapi",n:"rest-api-backend",s:"REST API",dom:"api_d",sk:"both",lang:"Python",fw:"aiohttp",desc:"REST API для внешней автоматизации.\n\nOpenAPI. CRUD правил МСЭ, пользователей, VPN-конфигураций, объектов alias.\n\nСценарии: SIEM, SOAR, DevOps/IaC (Terraform, Ansible).\n\nAPI-ключи. Rate limiting.",det:["OpenAPI","SIEM/SOAR"]},
  {id:"monitor",n:"monitor-backend",s:"Мониторинг",dom:"api_d",sk:"both",lang:"Python",fw:"aiohttp, pysnmp",desc:"Мониторинг состояния NGFW.\n\nCPU, RAM, диски (IOPS, usage), сетевые интерфейсы (bps, pps, errors). Метрики → ClickHouse.\n\nZabbix-agent, SNMP v2c/v3. Healthcheck сервисов. Проверка репутации IP через облако Ideco.",det:["Метрики→CH","Zabbix/SNMP"]},
  {id:"reports",n:"reports-backend",s:"Отчёты",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp, clickhouse-driver",desc:"Конструктор отчётов.\n\nЖурнал МСЭ, веб-трафик, IPS-алерты, DPI-статистика, загруженность каналов.\n\nИсточник — ClickHouse. Экспорт: CSV, PDF. Авторассылка по email.",det:["Конструктор","CSV/PDF"]},
  {id:"audit",n:"audit-backend",s:"Аудит",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Журнал действий администраторов.\n\nНередактируемый аудит-лог. Diff «было → стало» в JSON. ClickHouse, TTL 365 дней.\n\nФильтрация по администратору, типу действия, периоду. ФСТЭК/ФСБ.",det:["Diff","ФСТЭК"]},
  {id:"logs",n:"logs-backend",s:"Журналы",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Централизованный сбор логов.\n\nsystemd journal → ClickHouse. Syslog RFC 5424, CEF для SIEM (ArcSight, QRadar, Splunk). TCP/UDP.",det:["Syslog→CH","CEF"]},
  {id:"servers",n:"servers-backend",s:"Внешние серверы",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация внешних серверов.\n\nSyslog-коллекторы (TCP/UDP, RFC 5424, CEF). NTP-серверы. DNS upstream / DoH endpoints.\n\nНастройки в etcd PERMANENT, доступны через servers-lib.",det:["Syslog/NTP"]},
  {id:"auth",n:"auth-backend",s:"Аутентификация",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, gssapi",desc:"Ядро аутентификации и авторизации.\n\nМетоды: captive portal, SSO (Kerberos, NTLM), журналы AD, Ideco Client, IP/MAC, подсеть. 2FA.\n\nСессия привязана к IP. До 6 сессий на пользователя. Тайм-аут неактивных.",det:["SSO/NTLM/RADIUS","2FA"]},
  {id:"ad",n:"ad-backend",s:"Active Directory",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, ldap3",desc:"Интеграция с Active Directory.\n\nLDAP/LDAPS, несколько доменов, инкрементальная синхронизация по USN Changed.\n\nKerberos SSO (keytab/SPN), NTLM (Samba winbind). SQLite-кэш при недоступности DC.",det:["LDAP","Kerberos"]},
  {id:"ald",n:"ald-backend",s:"ALD Pro",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Интеграция с ALD Pro и FreeIPA.\n\nLDAP, Kerberos SSO. Для Astra Linux и ALT Linux — импортозамещение в госсекторе и КИИ.",det:["ALD/FreeIPA"]},
  {id:"user",n:"user-backend",s:"Пользователи",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, bcrypt",desc:"Локальные учётные записи.\n\nCRUD пользователей и групп. Квоты трафика. SQLite, пароли bcrypt. Импорт из CSV.",det:["CRUD","SQLite"]},
  {id:"webauthd",n:"web-authd",s:"Captive Portal",dom:"auth_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"Daemon captive portal.\n\niptables REDIRECT перехватывает HTTP неавторизованных → 302 на страницу входа. Только классический контекст.",det:["iptables"]},
  {id:"vpnauthd",n:"vpn-authd",s:"VPN-аутент.",dom:"auth_c",sk:"both",lang:"Python",fw:"daemon",desc:"Аутентификация VPN-клиентов.\n\nВызывается strongSwan (xauth/eap plugin). Проверяет через auth-backend, применяет 2FA. Возвращает IP и маршруты для клиента.",det:["xauth/eap"]},
  {id:"fw",n:"firewall-backend",s:"МСЭ",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp, nftables",desc:"Межсетевой экран.\n\nStateful Inspection. Таблицы: FORWARD, INPUT, DNAT, SNAT.\n\nПрофили безопасности (DPI, IPS) привязываются к разрешающим правилам. Зоны (до 64 интерфейсов).",det:["FORWARD/INPUT/DNAT/SNAT"]},
  {id:"cfw",n:"cfw-backend",s:"Custom FW",dom:"fw_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"Пользовательские правила nftables.\n\nPre-filter: выполняются ДО основного МСЭ. GeoIP-блокировка, специфический NAT. Только классический контекст.",det:["Pre-filter"]},
  {id:"alias",n:"alias-backend",s:"Объекты (38+)",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Объектная модель NGFW.\n\n38+ типов: IP, подсети, диапазоны, MAC, FQDN (динамический резолвинг), сервисы, расписания, зоны (LAN/WAN/DMZ), алиасы AD/ALD.\n\nПереиспользуются во всех правилах. alias-lib импортируют 30+ бэкендов.",det:["38+ модулей"]},
  {id:"shaper",n:"shaper-backend",s:"QoS",dom:"fw_c",sk:"classic",lang:"Python",fw:"aiohttp, pyroute2",desc:"Ограничение скорости входящего трафика.\n\nLinux tc, HTB/HFSC. Привязка к пользователям, группам, IP. Только классический контекст.",det:["tc HTB/HFSC"]},
  {id:"acl",n:"acl-backend",s:"ACL",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Трансляция правил МСЭ в ACL для Data Plane.\n\nМост Control Plane ↔ Data Plane. etcd watch → разворачивает alias-объекты → загружает ACL в eBPF maps или VPP ACL plugin.\n\nФиксирует accept/drop через NFLOG → ClickHouse.",det:["eBPF+VPP ACL"]},
  {id:"vpp_be",n:"vpp-backend",s:"VPP конфиг",dom:"fw_c",sk:"vpp",lang:"Python",fw:"aiohttp, vpp-api",desc:"Конфигурация VPP.\n\nPython API bindings: интерфейсы, ACL, L2-бриджи. Записывает состояние интерфейсов (link up/down, скорость, MTU) в etcd RUNTIME. Только VCE VPP.",det:["VPP API"]},
  {id:"l2",n:"l2-manager",s:"L2",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp, pyroute2",desc:"Управление сетевыми интерфейсами.\n\nEthernet, VLAN (802.1Q), Bond (LACP, active-backup), Bridge. KNI-интерфейсы для связи VPP с Linux kernel. pyroute2 / Netlink API.",det:["Eth/VLAN/Bond"]},
  {id:"dns_be",n:"dns-backend",s:"DNS конфиг",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация Unbound.\n\nРекурсивный резолвер, форвардер, авторитативный. Кэширование, DoH, DNSSEC. Пользовательские зоны и записи.",det:["DoH/DNSSEC"]},
  {id:"dhcp_be",n:"dhcp-server-backend",s:"DHCP конфиг",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация ISC DHCP.\n\nПулы по интерфейсам/VLAN, резервирование по MAC. DHCP relay, Dynamic DNS.",det:["Пулы/relay"]},
  {id:"netscan",n:"netscan-backend",s:"Сканер",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp, scapy",desc:"Обнаружение устройств.\n\nARP-сканирование, OS Fingerprinting (TTL, TCP window), MAC OUI.",det:["ARP"]},
  {id:"igmp",n:"igmpproxy-backend",s:"IGMP",dom:"net_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"IGMP Proxy — мультикаст-проксирование.\n\nПринимает мультикаст (IPTV) от провайдера. Join/Leave между WAN и LAN. Только классический контекст.",det:["IPTV"]},
  {id:"cf",n:"content-filter-backend",s:"Контент-фильтр",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp, rocksdb",desc:"Контент-фильтр.\n\n145 категорий URL (RocksDB). Морфологические словари, Safe Search. SSL Bump для полной фильтрации HTTPS.\n\nБаза обновляется из облака Ideco по подписке.",det:["145 кат."]},
  {id:"suricata_be",n:"suricata-backend",s:"IPS конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация IPS (Suricata).\n\nГруппы сигнатур: ET Open, ET Pro, Snort-совместимые, пользовательские. IPS-профили привязываются к правилам МСЭ.\n\nАлерты → ClickHouse. Пользовательские правила → SQLite.",det:["ET/Snort"]},
  {id:"av",n:"av-backend",s:"AV конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация антивируса.\n\nДва движка: Kaspersky Anti-Virus SDK и ClamAV. Проверка файлов через eCAP-модуль в Squid.",det:["ClamAV/Kaspersky"]},
  {id:"waf_be",n:"waf-backend",s:"WAF конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация WAF.\n\nModSecurity + OWASP CRS. Режимы: prevention (блокировка), detection (логирование). WAF-профили → публикации обратного прокси.",det:["ModSecurity"]},
  {id:"proxy_be",n:"proxy-backend",s:"Прокси конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация Squid.\n\nТипы: TPROXY (прозрачный) и прямые подключения.\n\nSSL Bump: bump (полная расшифровка), splice (пропуск), peek (SNI без расшифровки).",det:["TPROXY/SSL Bump"]},
  {id:"reverse",n:"reverse-backend",s:"Обр.прокси",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Обратный прокси.\n\nNginx с TLS-терминацией. Публикация внутренних веб-ресурсов в интернет.\n\nLet's Encrypt (ACME, HTTP-01). Интеграция с WAF.",det:["Let's Encrypt"]},
  {id:"vpnsrv",n:"vpn-servers-backend",s:"VPN-серверы",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"VPN-серверы для удалённого доступа.\n\nIKEv2/IPSec, L2TP/IPSec, SSTP. Автогенерация профилей. Правила авторизации по группам AD.",det:["5 протоколов"]},
  {id:"ipsec",n:"ipsec-backend",s:"IPSec s2s",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"IPSec site-to-site.\n\nIKEv1/v2. SA: Phase 1 (DH), Phase 2 (ESP). DPD, PFS, NAT-T.",det:["IKEv1/v2"]},
  {id:"gostvpn",n:"gost-vpn-backend",s:"ГОСТ VPN",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"ГОСТ VPN между двумя NGFW.\n\nГОСТ Р 34.12-2015: Кузнечик (128 бит), Магма (64 бит). Для КИИ, госорганов, требований ФСБ.",det:["ГОСТ"]},
  {id:"agent",n:"agent-backend",s:"Ideco Client",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Управление Ideco Client.\n\nФирменный VPN-клиент. Push-профили. Device VPN. Windows, macOS, Linux, Android, iOS.",det:["Push"]},
  {id:"wg",n:"wireguard-backend",s:"WireGuard",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация WireGuard.\n\nNoise Protocol, ChaCha20, Curve25519. Управление пирами, QR-коды для мобильных.",det:["Peers"]},
  {id:"routing",n:"routing-backend",s:"Маршрутизация",dom:"rt_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Маршрутизация через FRRouting.\n\nПорядок: direct → PBR → статика/BGP/OSPF → внешние сети → балансировка.\n\nPBR (по источнику, интерфейсу), BGP (провайдеры), OSPF (LAN), балансировка каналов.",det:["BGP/OSPF"]},
  {id:"mail",n:"mail-backend",s:"Почта",dom:"rt_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Почтовый релей.\n\nPostfix SMTP relay. Email-уведомления администраторам, авторассылка отчётов. DKIM, SPF, TLS.",det:["Postfix"]},
  // DATA PLANE
  {id:"vpp_dp",n:"VPP",s:"Userspace DP",dom:"dp_core",sk:"vpp",lang:"C",fw:"fd.io, DPDK",desc:"VPP (Vector Packet Processing).\n\nUserspace сетевой стек в VCE VPP. Обходит ядро Linux, пакеты напрямую через DPDK или AF_XDP.\n\nОбработка пачками (vectors) через граф узлов: приём → L2/L3 → ACL → NAT → отправка.\n\nKNI-интерфейсы → Suricata, Squid, FRRouting. Конфигурация от vpp-backend через etcd.",det:["DPDK","Vectors"]},
  {id:"unbound_dp",n:"Unbound",s:"DNS daemon",dom:"dp_core",sk:"both",lang:"C",fw:"Unbound",desc:"Unbound — DNS-сервер daemon.\n\nРекурсивный резолвер, форвардер, авторитативный. Кэширование, prefetch, DoH, DNSSEC.\n\nКонфигурация от dns-backend через etcd.",det:["Кэш","DoH"]},
  {id:"dhcpd_dp",n:"ISC DHCP",s:"DHCP daemon",dom:"dp_core",sk:"both",lang:"C",fw:"ISC DHCP",desc:"ISC DHCP — DHCP-сервер daemon.\n\nВыдача IP-адресов, пулы, резервирование по MAC, DHCP relay.\n\nКонфигурация от dhcp-server-backend через etcd.",det:["Пулы"]},
  {id:"suricata_dp",n:"Suricata",s:"IPS daemon",dom:"dp_ips",sk:"both",lang:"C",fw:"Suricata",desc:"Suricata — IPS inline daemon.\n\nNFQUEUE. ET Open/Pro + пользовательские сигнатуры.\n\nDrop (NF_DROP) или Alert (NF_ACCEPT + событие). Алерты → ClickHouse.\n\nКонфигурация от suricata-backend через etcd.",det:["NFQUEUE"]},
  {id:"squid_dp",n:"Squid",s:"HTTP/S прокси",dom:"dp_ips",sk:"both",lang:"C++",fw:"Squid, libecap",desc:"Squid — HTTP/HTTPS прокси daemon.\n\nПлатформа для контент-фильтра, AV и отчётности.\n\nTPROXY (прозрачный). SSL Bump для HTTPS. eCAP-модули in-process.\n\nКонфигурация от proxy-backend через etcd.",det:["eCAP"]},
  {id:"ecap_av",n:"ecap-av",s:"eCAP: AV",dom:"dp_ips",sk:"both",lang:"C++",fw:"libecap",desc:"eCAP-модуль антивирусной проверки.\n\nIn-process плагин для Squid (libecap). При скачивании файла → проверка через ClamAV (clamd) или Kaspersky по Unix socket.\n\nОбнаружена угроза → блокировка + страница уведомления.",det:["clamd"]},
  {id:"ecap_urls",n:"ecap-urls",s:"eCAP: URL",dom:"dp_ips",sk:"both",lang:"C++",fw:"libecap, rocksdb",desc:"eCAP-модуль URL-фильтрации.\n\nIn-process плагин для Squid. Каждый HTTP/S запрос → lookup в RocksDB (145 категорий, microseconds). Запрещена → блокировка.\n\nC++ для inline-производительности.",det:["RocksDB"]},
  {id:"modsec_dp",n:"ModSecurity",s:"WAF",dom:"dp_ips",sk:"both",lang:"C",fw:"ModSecurity",desc:"ModSecurity — WAF daemon.\n\nСвязка с Nginx (обратный прокси). OWASP Top 10: SQL injection, XSS, CSRF, Path Traversal.\n\nOWASP CRS, anomaly scoring.",det:["CRS"]},

var CW=148,CG=5,RH=36,RG=3,DT=16,LT=30,LP=12,IW=190;
function buildLayout(){
  var pos={},y=8,mW=0;
  LAYERS.forEach(function(lay){
    var ds=Object.keys(DOMS).filter(function(k){return DOMS[k].ly===lay.id;});
    var tw=LP;
    ds.forEach(function(){tw+=CW+CG+10;});
    if(tw>mW)mW=tw;
  });
  LAYERS.forEach(function(lay){
    var ds=Object.keys(DOMS).filter(function(k){return DOMS[k].ly===lay.id;});
    var maxR=0;
    ds.forEach(function(dk){var cnt=C.filter(function(c){return c.dom===dk;}).length;if(cnt>maxR)maxR=cnt;});
    var lH=LT+maxR*(RH+RG)+DT+12;
    pos["L_"+lay.id]={x:LP,y:y,w:mW,h:lH};
    var dx=LP+6;
    ds.forEach(function(dk){
      var comps=C.filter(function(c){return c.dom===dk;});
      var dW=CW+8;
      pos["D_"+dk]={x:dx,y:y+LT,w:dW,h:lH-LT-6};
      comps.forEach(function(c,ci){pos[c.id]={x:dx+4,y:y+LT+DT+ci*(RH+RG),w:CW,h:RH};});
      dx+=dW+CG;
    });
    y+=lH+6;
  });
  var iH=y-8-6,iX=mW+LP+10;
  pos.INFRA={x:iX,y:8,w:IW,h:iH};
  var infraDs=Object.keys(DOMS).filter(function(k){return DOMS[k].ly==="infra";});
  var iy=40;
  infraDs.forEach(function(dk){
    var comps=C.filter(function(c){return c.dom===dk;});
    var dH=comps.length*(RH+RG)+DT+8;
    pos["D_"+dk]={x:iX+6,y:8+iy,w:IW-12,h:dH};
    comps.forEach(function(c,ci){pos[c.id]={x:iX+10,y:8+iy+DT+ci*(RH+RG),w:IW-20,h:RH};});
    iy+=dH+6;
  });
  pos["D_db_i"]={x:iX+6,y:8+iy,w:IW-12,h:DBS.length*32+DT+8};
  DBS.forEach(function(db,di){pos[db.id]={x:iX+10,y:8+iy+DT+di*32,w:IW-20,h:26};});
  return pos;
}
var POS=buildLayout();

function getConn(id){
  var libs=LIBS[id];
  if(!libs)return new Set();
  var s=new Set();
  libs.forEach(function(lib){var m=LIB2ID[lib];if(m&&m!==id)s.add(m);});
  Object.keys(LIBS).forEach(function(oid){
    if(oid===id)return;
    (LIBS[oid]||[]).forEach(function(lib){var m=LIB2ID[lib];if(m===id)s.add(oid);});
  });
  return s;
}
function getLibsBtw(a,b){
  var r=[];
  (LIBS[a]||[]).forEach(function(l){if(LIB2ID[l]===b)r.push(l);});
  (LIBS[b]||[]).forEach(function(l){if(LIB2ID[l]===a&&r.indexOf(l)<0)r.push(l);});
  return r;
}
function getDbC(did){return DB_COMP_MAP[did]||[];}
function getDpLinks(id){return DP_LINKS.filter(function(l){return l.from===id||l.to===id;});}

          scLines.map(function(l,i){
            return React.createElement("line",{key:"sc"+i,x1:l.x1,y1:l.y1,x2:l.x2,y2:l.y2,stroke:"#4ecdc4",strokeWidth:3,opacity:0.8,strokeDasharray:"8,4"});
          }),
          // Legend
          React.createElement("g",{transform:"translate("+LP+","+(POS["L_data"]?POS["L_data"].y+POS["L_data"].h+14:500)+")"},
            React.createElement("rect",{x:0,y:0,width:420,height:18,rx:4,fill:T.CD+"dd",stroke:T.BD}),
            [
              {c:O,l:"Lib-связь",x:6},
              {c:CE,l:"PERM",x:62},
              {c:CE2,l:"RUN",x:98},
              {c:CC,l:"CH",x:126},
              {c:CS,l:"SQ",x:148},
              {c:CR,l:"RDB",x:170},
              {c:"#4ecdc4",l:"DP / Сценарий",x:194}
            ].map(function(x,i){
              return React.createElement("g",{key:i},
                React.createElement("rect",{x:x.x,y:6,width:8,height:3,rx:1,fill:x.c}),
                React.createElement("text",{x:x.x+10,y:11,fontSize:6,fill:T.TM},x.l)
              );
            }),
            React.createElement("text",{x:310,y:11,fontSize:6,fill:T.TD},"hover на линию = протокол")
          )
        )
      ),

      // Tooltip
      tt?React.createElement("div",{style:{position:"absolute",left:Math.min(tt.x,window.innerWidth-270),top:Math.max(10,tt.y),background:T.CD+"f8",border:"1px solid "+T.BD,borderRadius:8,padding:"8px 12px",maxWidth:260,zIndex:30,pointerEvents:"none",fontSize:11,color:T.TX,lineHeight:"1.6",whiteSpace:"pre-line",boxShadow:"0 4px 16px #0004"}},tt.text):null,

      // Top controls
      React.createElement("div",{style:{position:"absolute",top:8,left:8,zIndex:20,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}},
        React.createElement("input",{value:search,onChange:function(e){setSearch(e.target.value);setScenario(null);setTeamHL(null);},placeholder:"🔍 Поиск по имени/описанию...",style:{width:210,padding:"5px 8px",borderRadius:6,border:"1px solid "+T.BD,background:T.BG+"ee",color:T.TX,fontSize:11,outline:"none"}}),
        React.createElement("select",{value:scenario||"",onChange:function(e){var v=e.target.value;setScenario(v||null);setScStep(0);setSel(null);setSDb(null);setTeamHL(null);},style:{padding:"5px 6px",borderRadius:6,border:"1px solid "+T.BD,background:T.CD,color:T.TX,fontSize:10,outline:"none",cursor:"pointer"}},
          React.createElement("option",{value:""},"📋 Сценарии"),
          SCENARIOS.map(function(s){return React.createElement("option",{key:s.id,value:s.id},s.name);})
        ),
        React.createElement("button",{onClick:function(){setShowTeams(!showTeams);},style:{padding:"5px 8px",borderRadius:6,border:"1px solid "+(showTeams?O:T.BD),background:showTeams?O+"20":T.CD,color:showTeams?O:T.TX,cursor:"pointer",fontSize:10,fontWeight:600}},"👥 Команды"),
        React.createElement("button",{onClick:function(){setTheme(theme==="dark"?"light":"dark");},style:{padding:"5px 8px",borderRadius:6,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:10}},theme==="dark"?"☀️":"🌙")
      ),

      // FIX #6: Scenario panel with full step desc
      activeSc?React.createElement("div",{style:{position:"absolute",bottom:42,left:8,right:showSB?390:8,zIndex:20,background:T.CD+"f5",border:"1px solid #4ecdc444",borderRadius:8,padding:"10px 14px"}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
          React.createElement("span",{style:{fontSize:12,color:"#4ecdc4",fontWeight:700}},"📋 "+activeSc.name),
          React.createElement("span",{style:{fontSize:9,color:T.TD}},scStep+1+" из "+activeSc.steps.length)
        ),
        React.createElement("div",{style:{display:"flex",gap:4,alignItems:"center",marginBottom:8}},
          React.createElement("button",{onClick:function(){setScStep(Math.max(0,scStep-1));},disabled:scStep===0,style:{padding:"3px 10px",borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:12,opacity:scStep===0?0.4:1}},"←"),
          activeSc.steps.map(function(s,i){
            return React.createElement("div",{key:i,onClick:function(){setScStep(i);},style:{flex:1,height:4,borderRadius:2,background:i<=scStep?"#4ecdc4":T.BD,opacity:i===scStep?1:0.5,cursor:"pointer"}});
          }),
          React.createElement("button",{onClick:function(){setScStep(Math.min(activeSc.steps.length-1,scStep+1));},disabled:scStep>=activeSc.steps.length-1,style:{padding:"3px 10px",borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:12,opacity:scStep>=activeSc.steps.length-1?0.4:1}},"→")
        ),
        React.createElement("div",{style:{background:T.BG,borderRadius:6,padding:"8px 12px",border:"1px solid #4ecdc433"}},
          React.createElement("div",{style:{fontSize:12,color:"#4ecdc4",fontWeight:700,marginBottom:4}},activeSc.steps[scStep].label),
          React.createElement("div",{style:{fontSize:11,color:T.TX,whiteSpace:"pre-line",lineHeight:"1.6"}},activeSc.steps[scStep].desc)
        )
      ):null,

      // Zoom controls
      React.createElement("div",{style:{position:"absolute",bottom:8,left:8,display:"flex",gap:3,zIndex:20}},
        React.createElement("button",{onClick:function(){setZoom(Math.min(2.5,zoom*1.2));},style:{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}},"+"),
        React.createElement("button",{onClick:function(){setZoom(Math.max(0.12,zoom/1.2));},style:{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}},"−"),
        React.createElement("button",{onClick:function(){setZoom(0.42);setPan({x:0,y:0});},style:{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}},"⟲")
      )
    ),

    // Sidebar
    showSB?React.createElement("div",{style:{width:380,minWidth:380,background:T.CD,borderLeft:"1px solid "+T.BD,overflowY:"auto",display:"flex",flexDirection:"column"}},
      React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",padding:"6px 10px 0"}},
        React.createElement("button",{onClick:function(){setSel(null);setSL(null);setSD(null);setSDb(null);},style:{background:"none",border:"none",color:T.TD,cursor:"pointer",fontSize:16}},"✕")
      ),
      React.createElement("div",{style:{flex:1,overflowY:"auto"}},side)
    ):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
