const CW=148,CG=5,RH=36,RG=3,DT=16,LT=30,LP=12,IW=190;
function buildLayout() {
  const pos={};let y=8,mW=0;
  LAYERS.forEach(lay=>{
    const ds=Object.keys(DOMS).filter(k=>DOMS[k].ly===lay.id);
    let tw=LP; ds.forEach(()=>{tw+=CW+CG+10;}); if(tw>mW)mW=tw;
  });
  LAYERS.forEach(lay=>{
    const ds=Object.keys(DOMS).filter(k=>DOMS[k].ly===lay.id);
    let maxR=0; ds.forEach(dk=>{const cnt=C.filter(c=>c.dom===dk).length;if(cnt>maxR)maxR=cnt;});
    const lH=LT+maxR*(RH+RG)+DT+12;
    pos["L_"+lay.id]={x:LP,y,w:mW,h:lH};
    let dx=LP+6;
    ds.forEach(dk=>{
      const comps=C.filter(c=>c.dom===dk),dW=CW+8;
      pos["D_"+dk]={x:dx,y:y+LT,w:dW,h:lH-LT-6};
      comps.forEach((c,ci)=>{pos[c.id]={x:dx+4,y:y+LT+DT+ci*(RH+RG),w:CW,h:RH};});
      dx+=dW+CG;
    });
    y+=lH+6;
  });
  const iH=y-8-6,iX=mW+LP+10;
  pos.INFRA={x:iX,y:8,w:IW,h:iH};
  const infraDs=Object.keys(DOMS).filter(k=>DOMS[k].ly==="infra");
  let iy=40;
  infraDs.forEach(dk=>{
    const comps=C.filter(c=>c.dom===dk),dH=comps.length*(RH+RG)+DT+8;
    pos["D_"+dk]={x:iX+6,y:8+iy,w:IW-12,h:dH};
    comps.forEach((c,ci)=>{pos[c.id]={x:iX+10,y:8+iy+DT+ci*(RH+RG),w:IW-20,h:RH};});
    iy+=dH+6;
  });
  pos["D_db_i"]={x:iX+6,y:8+iy,w:IW-12,h:DBS.length*32+DT+8};
  DBS.forEach((db,di)=>{pos[db.id]={x:iX+10,y:8+iy+DT+di*32,w:IW-20,h:26};});
  return pos;
}
const POS=buildLayout();

function getConn(id) {
  const libs=LIBS[id]; if(!libs) return new Set();
  const s=new Set();
  libs.forEach(lib=>{const m=LIB2ID[lib];if(m&&m!==id)s.add(m);});
  Object.keys(LIBS).forEach(oid=>{
    if(oid===id)return;
    (LIBS[oid]||[]).forEach(lib=>{const m=LIB2ID[lib];if(m===id)s.add(oid);});
  });
  return s;
}
function getLibsBtw(a,b) {
  const r=[];
  (LIBS[a]||[]).forEach(l=>{if(LIB2ID[l]===b)r.push(l);});
  (LIBS[b]||[]).forEach(l=>{if(LIB2ID[l]===a&&!r.includes(l))r.push(l);});
  return r;
}
function getDbC(did){return DB_COMP_MAP[did]||[];}
function getDpLinks(id){return DP_LINKS.filter(l=>l.from===id||l.to===id);}

// FIX #2: ортогональный путь между двумя прямоугольниками
// Выходим от ближайшей стороны, делаем одно колено (L-shape)
function orthoPts(ax,ay,aw,ah, bx,by,bw,bh) {
  const aCx=ax+aw/2, aCy=ay+ah/2;
  const bCx=bx+bw/2, bCy=by+bh/2;
  const STUB=10; // длина перпендикулярного отрезка от рамки
  let x1,y1,ex1,ey1, x2,y2,ex2,ey2;

  // Определяем лучшую сторону выхода из A и входа в B
  // на основе относительного положения центров
  const dx=bCx-aCx, dy=bCy-aCy;
  const adx=Math.abs(dx), ady=Math.abs(dy);

  // Сторона выхода из A
  if(adx>=ady){
    if(dx>0){ x1=ax+aw; y1=aCy; ex1=x1+STUB; ey1=y1; }
    else     { x1=ax;    y1=aCy; ex1=x1-STUB; ey1=y1; }
  } else {
    if(dy>0){ x1=aCx; y1=ay+ah; ex1=x1; ey1=y1+STUB; }
    else     { x1=aCx; y1=ay;    ex1=x1; ey1=y1-STUB; }
  }

  // Сторона входа в B (противоположная логика)
  if(adx>=ady){
    if(dx>0){ x2=bx;    y2=bCy; ex2=x2-STUB; ey2=y2; }
    else     { x2=bx+bw; y2=bCy; ex2=x2+STUB; ey2=y2; }
  } else {
    if(dy>0){ x2=bCx; y2=by;    ex2=x2; ey2=y2-STUB; }
    else     { x2=bCx; y2=by+bh; ex2=x2; ey2=y2+STUB; }
  }

  // Средняя точка для излома — перпендикулярное колено
  // Горизонтальный выход: идём горизонтально до x2, потом вертикально
  // Вертикальный выход: идём вертикально до y2, потом горизонтально
  let mx,my;
  if(Math.abs(ex1-x1)>0){ // горизонтальный выход из A
    mx=ex2; my=ey1;
  } else {                  // вертикальный выход из A
    mx=ex1; my=ey2;
  }

  return `M${x1},${y1} L${ex1},${ey1} L${mx},${my} L${ex2},${ey2} L${x2},${y2}`;
}

          <defs><filter id="gl"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
            {/* Layer backgrounds */}
            {LAYERS.map(lay=>{const p=POS["L_"+lay.id];if(!p)return null;return(
              <g key={lay.id} onClick={e=>si(()=>{setSL(lay.id);setSel(null);setSD(null);setSDb(null);},e)} style={{cursor:"pointer"}}>
                <rect x={p.x} y={p.y} width={p.w} height={p.h} rx={10} fill={lay.color+"08"} stroke={lay.color+"33"} strokeWidth={1.5} strokeDasharray="10,5"/>
                <text x={p.x+10} y={p.y+16} fontSize={12} fontWeight={800} fill={lay.color} letterSpacing="1.5">{lay.label}</text>
                <text x={p.x+10} y={p.y+28} fontSize={8} fill={T.TD}>{lay.desc}</text>
              </g>
            );})}
            {POS.INFRA&&<g onClick={e=>si(()=>{setSL("infra");setSel(null);setSD(null);setSDb(null);},e)} style={{cursor:"pointer"}}>
              <rect x={POS.INFRA.x} y={POS.INFRA.y} width={POS.INFRA.w} height={POS.INFRA.h} rx={10} fill={O3+"08"} stroke={O3+"33"} strokeWidth={1.5} strokeDasharray="10,5"/>
              <text x={POS.INFRA.x+8} y={POS.INFRA.y+18} fontSize={12} fontWeight={800} fill={O3} letterSpacing="1.5">INFRASTRUCTURE</text>
            </g>}
            {/* Domain backgrounds */}
            {Object.keys(DOMS).map(dk=>{const dv=DOMS[dk],p=POS["D_"+dk];if(!p)return null;return(
              <g key={dk} onClick={e=>si(()=>{setSD(dk);setSel(null);setSL(null);setSDb(null);},e)} style={{cursor:"pointer"}}>
                <rect x={p.x} y={p.y} width={p.w} height={p.h} rx={6} fill={T.CD} stroke={dv.c+"30"}/>
                <text x={p.x+5} y={p.y+12} fontSize={8} fontWeight={700} fill={dv.c}>{dv.l}</text>
              </g>
            );})}
            {/* FIX #3: DB nodes — подсвечиваются только при клике (adb=sDb), не при hover */}
            {DBS.map(db=>{
  const p=POS[db.id]; if(!p)return null;
  const lit=(ac&&selCompDbs.has(db.id))||(adb===db.id);
  // Если что-то выбрано но этот DB не связан — гасим как бэкенд
  const dim=!!(
    (ac&&!selCompDbs.has(db.id)&&adb!==db.id)||
    (adb&&adb!==db.id)
  );
  return(
    <g key={db.id}
      onClick={e=>si(()=>{setSDb(sDb===db.id?null:db.id);setSel(null);setSL(null);setSD(null);},e)}
      style={{cursor:"pointer"}}
      opacity={dim?0.07:1}>
      <rect x={p.x} y={p.y} width={p.w} height={p.h} rx={5}
        fill={lit?db.color+"22":T.CD}
        stroke={lit?db.color:db.color+"44"}
        strokeWidth={lit?2.5:1}/>
      <text x={p.x+6} y={p.y+11} fontSize={8} fontWeight={700} fill={db.color}>{db.n}</text>
      <text x={p.x+6} y={p.y+21} fontSize={6} fill={T.TD}>{db.sub}</text>
    </g>
  );
})}
            {/* Lines — под бэкендами, над слоями */}
            {svcL.map((l,i)=>(
              <path key={"s"+i} d={l.d} fill="none"
                stroke={O+"88"} strokeWidth={1.5} opacity={0.85} strokeDasharray="5,3"
                style={{pointerEvents:"none"}}/>
            ))}
            {dbLines.map((l,i)=>(
              <path key={"d"+i} d={l.d} fill="none"
                stroke={l.color} strokeWidth={2} opacity={0.7} strokeDasharray="6,4"
                style={{pointerEvents:"none"}}/>
            ))}
            {dpLines.map((l,i)=>(
              <path key={"dp"+i} d={l.d} fill="none"
                stroke={"#4ecdc4"} strokeWidth={1.5} opacity={0.9} strokeDasharray="5,3"
                style={{pointerEvents:"none"}}/>
            ))}
            {/* Component rects */}
            {C.map(c=>{const p=POS[c.id];if(!p)return null;
              const isS=sel===c.id,isC=conn.has(c.id),isDbC=dbBk.has(c.id),isSc=scHighlight.has(c.id),isScCur=scCurrent&&scCurrent.comp===c.id,isTHL=teamHLSet.has(c.id),isDpC=dpConnSet.has(c.id);
              const hc=isDbC&&activeDbColor?activeDbColor:null;
              const tid=compTeamMap[c.id];const tc=tid?TCOL[tid]:null;
              const dim=!scenario&&!teamHL&&((ac&&!isS&&!isC&&!isDpC)||(adb&&!isDbC)||(sIds&&!sIds.has(c.id)));
              const scDim=scenario&&!isSc,tDim=teamHL&&!isTHL;
              const fillC=isScCur?"#4ecdc430":isSc?"#4ecdc415":isS?O+"30":isDpC?"#4ecdc415":isC?O+"12":isDbC?(hc||CE)+"15":isTHL&&tc?tc+"15":T.CD;
              const strC=isScCur?"#4ecdc4":isSc?"#4ecdc466":isS?O:isDpC?"#4ecdc466":isC?O+"66":isDbC?(hc||CE)+"55":isTHL&&tc?tc:T.BD;
              const strW=isS||isScCur?2:isDpC||isC||isDbC||isSc||isTHL?1.5:1;
              const txC=isScCur?"#4ecdc4":isSc?"#4ecdc4":isS?T.TX:isDpC?"#4ecdc4":isC?O:isDbC?(hc||CE):isTHL&&tc?tc:T.TM;
              return(
                <g key={c.id} onClick={e=>si(()=>{setSel(sel===c.id?null:c.id);setSL(null);setSD(null);setSDb(null);setScenario(null);setTeamHL(null);setShowAllLinks(false);},e)} style={{cursor:"pointer"}} opacity={dim||scDim||tDim?0.07:1}>
                  {tc&&<rect x={p.x} y={p.y} width={4} height={p.h} rx={2} fill={tc} opacity={0.8}/>}
                  <rect x={p.x} y={p.y} width={p.w} height={p.h} rx={5} fill={fillC} stroke={strC} strokeWidth={strW}/>
                  <text x={p.x+8} y={p.y+14} fontSize={9} fontWeight={700} fill={txC}>{c.n}</text>
                  <text x={p.x+8} y={p.y+25} fontSize={7} fill={T.TD}>{c.s}</text>
                  <rect x={p.x+p.w-34} y={p.y+2} width={32} height={10} rx={3} fill={SC[c.sk]+"22"} stroke={SC[c.sk]+"44"} strokeWidth={0.5}/>
                  <text x={p.x+p.w-18} y={p.y+10} fontSize={6} fontWeight={700} fill={SC[c.sk]} textAnchor="middle">{SL[c.sk]}</text>
                  {isScCur&&<text x={p.x+p.w/2} y={p.y-4} fontSize={10} fontWeight={800} fill="#4ecdc4" textAnchor="middle">▼</text>}
                </g>
              );
            })}
            {scLines.map((l,i)=><line key={"sc"+i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#4ecdc4" strokeWidth={3} opacity={0.8} strokeDasharray="8,4"/>)}

            {/* FIX #2: тултипы только на легенде */}
            <g transform={`translate(${LP},${POS["L_data"]?POS["L_data"].y+POS["L_data"].h+14:500})`}>
              <rect x={0} y={0} width={480} height={18} rx={4} fill={T.CD+"dd"} stroke={T.BD}/>
              {[
                {c:O+"88",    l:"Lib-связь",   x:6},
                {c:CE,        l:"PERM",         x:68},
                {c:CE2,       l:"RUN",          x:104},
                {c:CC,        l:"CH",           x:132},
                {c:CS,        l:"SQLite",       x:154},
                {c:CR,        l:"RocksDB",      x:196},
                {c:"#4ecdc4", l:"DP-протокол",  x:244},
                {c:"#4ecdc4", l:"Сценарий",     x:330},
              ].map((x,i)=>(
                <g key={i} style={{cursor:"help"}}
                 >
                  <rect x={x.x} y={6} width={8} height={3} rx={1} fill={x.c}/>
                  <text x={x.x+10} y={11} fontSize={6} fill={T.TM}>{x.l}</text>
                </g>
              ))}
            </g>
          </g>
        </svg>

        {tt&&<div style={{position:"absolute",left:Math.min(tt.x,window.innerWidth-270),top:Math.max(10,tt.y),background:T.CD+"f8",border:"1px solid "+T.BD,borderRadius:8,padding:"8px 12px",maxWidth:260,zIndex:30,pointerEvents:"none",fontSize:11,color:T.TX,lineHeight:"1.6",whiteSpace:"pre-line",boxShadow:"0 4px 16px #0004"}}>{tt.text}</div>}

        <div style={{position:"absolute",top:8,left:8,zIndex:20,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
          {/* FIX #5: плейсхолдер */}
          <input value={search} onChange={e=>{setSearch(e.target.value);setScenario(null);setTeamHL(null);}} placeholder="🔍 Поиск..." style={{width:160,padding:"5px 8px",borderRadius:6,border:"1px solid "+T.BD,background:T.BG+"ee",color:T.TX,fontSize:11,outline:"none"}}/>
          <select value={scenario||""} onChange={e=>{const v=e.target.value;setScenario(v||null);setScStep(0);setSel(null);setSDb(null);setTeamHL(null);}} style={{padding:"5px 6px",borderRadius:6,border:"1px solid "+T.BD,background:T.CD,color:T.TX,fontSize:10,outline:"none",cursor:"pointer"}}>
            <option value="">📋 Сценарии</option>
            {SCENARIOS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <button onClick={()=>setShowTeams(!showTeams)} style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+(showTeams?O:T.BD),background:showTeams?O+"20":T.CD,color:showTeams?O:T.TX,cursor:"pointer",fontSize:10,fontWeight:600}}>👥 Команды</button>
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:10}}>{theme==="dark"?"☀️":"🌙"}</button>
        </div>

        {activeSc&&<div style={{position:"absolute",bottom:42,left:8,right:showSB?390:8,zIndex:20,background:T.CD+"f5",border:"1px solid #4ecdc444",borderRadius:8,padding:"10px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,color:"#4ecdc4",fontWeight:700}}>📋 {activeSc.name}</span>
            <span style={{fontSize:9,color:T.TD}}>{scStep+1} из {activeSc.steps.length}</span>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:8}}>
            <button onClick={()=>setScStep(Math.max(0,scStep-1))} disabled={scStep===0} style={{padding:"3px 10px",borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:12,opacity:scStep===0?0.4:1}}>←</button>
            {activeSc.steps.map((s,i)=><div key={i} onClick={()=>setScStep(i)} style={{flex:1,height:4,borderRadius:2,background:i<=scStep?"#4ecdc4":T.BD,opacity:i===scStep?1:0.5,cursor:"pointer"}}/>)}
            <button onClick={()=>setScStep(Math.min(activeSc.steps.length-1,scStep+1))} disabled={scStep>=activeSc.steps.length-1} style={{padding:"3px 10px",borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:12,opacity:scStep>=activeSc.steps.length-1?0.4:1}}>→</button>
          </div>
          <div style={{background:T.BG,borderRadius:6,padding:"8px 12px",border:"1px solid #4ecdc433"}}>
            <div style={{fontSize:12,color:"#4ecdc4",fontWeight:700,marginBottom:4}}>{activeSc.steps[scStep].label}</div>
            <div style={{fontSize:11,color:T.TX,whiteSpace:"pre-line",lineHeight:"1.6"}}>{activeSc.steps[scStep].desc}</div>
          </div>
        </div>}

        <div style={{position:"absolute",bottom:8,left:8,display:"flex",gap:3,zIndex:20}}>
          <button onClick={()=>setZoom(Math.min(2.5,zoom*1.2))} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>+</button>
          <button onClick={()=>setZoom(Math.max(0.12,zoom/1.2))} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>−</button>
          <button onClick={()=>{setZoom(0.42);setPan({x:0,y:0});}} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>⟲</button>
        </div>
      </div>

      {showSB&&<div style={{width:380,minWidth:380,background:T.CD,borderLeft:"1px solid "+T.BD,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"flex-end",padding:"6px 10px 0"}}>
          <button onClick={()=>{setSel(null);setSL(null);setSD(null);setSDb(null);}} style={{background:"none",border:"none",color:T.TD,cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>{side}</div>
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
