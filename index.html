var LAYERS=[{id:"mgmt",label:"MANAGEMENT PLANE",desc:"UI, API, отчёты, аудит",color:O2},{id:"ctrl",label:"CONTROL PLANE",desc:"Конфигурация: файрвол, аутентификация, сеть, безопасность, VPN",color:O3},{id:"data",label:"DATA PLANE",desc:"Обработка трафика: VPP, eBPF, Suricata, Squid, DPI",color:O}];
var LAYER_DESC={mgmt:"Уровень управления и наблюдаемости.\n\nЕдинственная точка взаимодействия администратора и внешних систем с NGFW. Через этот уровень настраиваются все параметры, просматривается состояние системы и анализируется трафик.\n\nКомпоненты Management Plane не участвуют в обработке сетевого трафика. Они работают «над» остальными уровнями: читают конфигурацию из etcd, записывают изменения администратора обратно в etcd, и визуализируют аналитику из ClickHouse.\n\nВключает:\n— Веб-интерфейс администратора с ролевой моделью доступа и двухфакторной аутентификацией\n— Личный кабинет пользователя для самообслуживания (смена пароля, статистика, VPN-профили)\n— REST API на основе OpenAPI для автоматизации и интеграции с SIEM/SOAR\n— Панель мониторинга: состояние сервера (CPU, RAM, диски, интерфейсы), авторизованные пользователи, трафик в реальном времени\n— Отчёты и журналы: конструктор отчётов с экспортом в CSV/PDF, журналы МСЭ, веб-трафика, IPS, DPI\n— Аудит действий администраторов\n\nНужен для того, чтобы администратор мог видеть полную картину происходящего в сети и управлять всеми модулями NGFW из одного места, а внешние системы — взаимодействовать с NGFW программно.",
                ctrl:"Уровень конфигурации и бизнес-логики.\n\nОпределяет правила игры: что фильтровать, кого пускать, куда маршрутизировать, как проксировать. Бэкенды этого уровня принимают настройки от Management Plane, проверяют их корректность и записывают в etcd. Компоненты Data Plane наблюдают за изменениями в etcd и автоматически применяют новую конфигурацию.\n\nНе обрабатывает трафик напрямую — только генерирует конфигурацию для тех, кто обрабатывает.\n\nВключает:\n— Правила трафика: межсетевой экран (таблицы FORWARD, INPUT, DNAT, SNAT), контент-фильтр, ограничение скорости, предотвращение вторжений, объекты (IP-группы, сервисы, расписания, зоны)\n— Профили безопасности: наборы параметров для контроля приложений (DPI L7), предотвращения вторжений (IPS), WAF и антивируса — привязываются к правилам МСЭ и применяются независимо друг от друга\n— Пользователи: учётные записи, интеграция с внешними каталогами (AD, ALD Pro, FreeIPA, RADIUS), аутентификация, авторизация, VPN-подключения, Ideco Client, профили устройств\n— Сервисы: конфигурация сетевых интерфейсов, прокси, обратного прокси, DNS, DHCP, IPSec, ГОСТ VPN, сертификатов\n— Маршрутизация: статическая, PBR, BGP, OSPF, балансировка и резервирование каналов\n— Почтовый релей\n\nНужен для того, чтобы описать желаемое поведение NGFW в виде правил и политик, которые затем автоматически транслируются в рабочую конфигурацию daemon'ов Data Plane.",
                data:"Уровень обработки трафика.\n\nЗдесь происходит реальная работа: каждый пакет, проходящий через NGFW, обрабатывается компонентами этого уровня. Включает как daemon'ы ОС (Suricata, Squid, Unbound, strongSwan, FRRouting), так и высокопроизводительные C/C++ компоненты (VPP, eBPF, eCAP-модули, nDPI).\n\nОбработка трафика проходит три стадии:\n1. Предварительная — аппаратная фильтрация, предварительная фильтрация, ограничение скорости. Если пакет попадает под запрещающее правило, он отбрасывается и дальше не идёт.\n2. Межсетевой экран — проверка по таблицам DNAT, INPUT и FORWARD. Веб-трафик направляется в прокси для проверки контент-фильтром и антивирусом. Трафик, прошедший разрешающие правила, попадает на L7-инспекцию через NFQUEUE (предотвращение вторжений, контроль приложений).\n3. Завершающая — SNAT (подмена адреса источника), шифрование VPN-трафика, отправка получателю.\n\nL7-инспекции работают иначе, чем МСЭ: межсетевой экран принимает решение один раз при установлении соединения (stateful), а L7-модули анализируют каждый пакет внутри соединения и могут заблокировать его на любом этапе.\n\nNGFW работает в двух режимах: Классический контекст (Linux networking, nftables, eBPF XDP) и Высокопроизводительный VCE (VPP/DPDK, userspace обработка). Data Plane содержит компоненты обоих режимов.\n\nНужен для того, чтобы применять все настроенные в Control Plane правила и политики к реальному сетевому трафику — фильтровать, инспектировать, проксировать, маршрутизировать, шифровать.",
                infra:"Инфраструктурный уровень — фундамент системы.\n\nОбеспечивает работу всего остального: базовые настройки сервера, лицензирование, обновления, резервное копирование, сертификаты, виртуальные контексты, кластеризацию и хранилища данных. Без этого уровня ни один другой уровень не функционирует.\n\nВключает:\n— Управление сервером: администраторы (локальные, из AD/ALD Pro/RADIUS), часовой пояс, терминал для диагностики\n— Лицензирование: привязка лицензии к серверу (онлайн/офлайн), подписки на модули (IPS, антивирус, контент-фильтр, VPN), лимиты пользователей\n— Обновления: автоматическое обновление ОС, ядра и баз (IPS, антивирус, контент-фильтр, GeoIP)\n— Бэкапы: создание и восстановление резервных копий конфигурации\n— PKI: центр сертификации, создание и управление SSL-сертификатами для SSL Bump, VPN, веб-интерфейса, обратного прокси\n— VCE: разделение одного физического NGFW на несколько независимых виртуальных контекстов со своими правилами и интерфейсами (Классический и Высокопроизводительный режимы)\n— Кластеризация: два сервера NGFW в режиме Active-Passive с автоматическим переключением\n— Ideco Center: централизованное управление парком устройств NGFW\n\nХранилища данных:\n— etcd PERMANENT: вся постоянная конфигурация (правила, настройки, объекты) — сохраняется при перезагрузке\n— etcd RUNTIME: оперативные данные (состояние интерфейсов, текущие сессии, статусы) — пересоздаётся при старте\n— ClickHouse: аналитика и логи (журналы МСЭ, DNS-запросы, IPS алерты, DPI статистика, WAF события)\n— SQLite (3 отдельных базы): кэш AD-пользователей, локальные учётные записи, пользовательские правила IPS\n— RocksDB: база URL-категорий контент-фильтра (145 категорий)\n\nНужен для того, чтобы NGFW можно было установить, лицензировать, обновлять, масштабировать (VCE), делать отказоустойчивым (кластер) и хранить все данные, на которые опираются остальные уровни."};
var DOMS={ui:{l:"Веб-интерфейс",ly:"mgmt",c:O2},rpt:{l:"Отчёты",ly:"mgmt",c:O3},api_d:{l:"API/Мониторинг",ly:"mgmt",c:O},auth_c:{l:"Аутентификация",ly:"ctrl",c:O2},fw_c:{l:"Файрвол",ly:"ctrl",c:O},net_c:{l:"Сеть",ly:"ctrl",c:O3},sec_c:{l:"Безопасность",ly:"ctrl",c:Ob},vpn_c:{l:"VPN",ly:"ctrl",c:O4},rt_c:{l:"Маршрутизация",ly:"ctrl",c:O2},dp_core:{l:"Ядро DP",ly:"data",c:O},dp_ips:{l:"IPS/Прокси",ly:"data",c:Ob},dp_dpi:{l:"DPI/Стат.",ly:"data",c:O4},dp_acl:{l:"ACL/Routing",ly:"data",c:O2},sys_i:{l:"Ядро",ly:"infra",c:O3},ha_i:{l:"HA",ly:"infra",c:O2},db_i:{l:"Хранилища",ly:"infra",c:"#8888aa"}};
var DOM_DESC={ui:"Основной интерфейс для работы с NGFW.\n\nЧерез этот модуль администраторы управляют всеми настройками NGFW, а пользователи сети — своими учётными записями и VPN-подключениями. Модуль состоит из двух независимых приложений с разными URL и разными правами доступа.\n\nВеб-интерфейс администратора (web-backend) — полная панель управления всеми модулями NGFW. Доступ разделён по ролям: суперадминистратор видит и может менять всё, администратор МСЭ — только правила трафика и сетевые настройки, администратор ИБ — модули безопасности (IPS, антивирус, контент-фильтр, WAF), аудитор — только просмотр без возможности изменений. Для входа поддерживается двухфакторная аутентификация: TOTP-токены, SMS через SMS Aero, корпоративный сервис Multifactor. Встроена интеграция с Telegram для push-уведомлений о событиях безопасности. Технически — это Nginx (отдаёт статику и проксирует запросы) + async Python-приложение на aiohttp.\n\nЛичный кабинет пользователя (user-cabinet-backend) — портал самообслуживания для конечных пользователей сети. Позволяет сменить пароль, посмотреть свою статистику трафика, скачать VPN-профили для подключения через Ideco Client или стандартные клиенты. Также предоставляет SSL VPN портал — доступ к внутренним веб-ресурсам организации прямо из браузера, без установки VPN-клиента.\n\nОба приложения работают только с etcd (чтение/запись конфигурации) и ClickHouse (чтение аналитики для дашбордов). Сам трафик не обрабатывают.",
              rpt:"Программный интерфейс и наблюдение за состоянием системы.\n\nЭтот модуль решает две задачи: даёт возможность внешним системам взаимодействовать с NGFW программно (через REST API) и обеспечивает контроль за здоровьем и производительностью самого устройства (мониторинг).\n\nREST API (rest-api-backend) — программный интерфейс на основе спецификации OpenAPI. Покрывает все функции NGFW, доступные через веб-интерфейс: управление правилами МСЭ, пользователями, VPN-конфигурациями, объектами. Типичные сценарии использования: подключение SIEM-системы для получения событий безопасности и автоматической блокировки IP-адресов, интеграция с SOAR для автоматического реагирования на инциденты, DevOps-автоматизация (конфигурация NGFW как код через Terraform или Ansible). Доступ через API-ключи с rate limiting.\n\nМониторинг (monitor-backend) — сбор и отображение состояния NGFW в реальном времени. Панель мониторинга в веб-интерфейсе показывает: загрузку CPU и RAM, состояние дисков, статус и загруженность каждого сетевого интерфейса, список авторизованных пользователей, трафик в реальном времени. Метрики записываются в ClickHouse для построения графиков за произвольный период. Поддерживает интеграцию с внешними системами мониторинга: Zabbix-agent для отправки метрик, SNMP v2c/v3 для опроса со стороны NMS. Проверяет работоспособность всех внутренних сервисов NGFW (healthcheck). Умеет проверять репутацию IP-адресов и доменов через облачный сервис Ideco.",
              api_d:"Аналитика, журналирование и аудит действий.\n\nМодуль отвечает за всё, что связано с анализом прошлых событий: что происходило в сети, кто куда ходил, какие правила сработали, что делали администраторы. Все данные хранятся в ClickHouse — колоночной СУБД, которая позволяет быстро агрегировать большие объёмы логов.\n\nДвижок отчётов (reports-backend) — конструктор отчётов с набором готовых шаблонов. Администратор может получить: журнал межсетевого экрана (какие правила сработали, что заблокировано, что пропущено), статистику веб-трафика (какие сайты посещались, по каким категориям, кем), алерты IPS (какие атаки обнаружены), статистику по приложениям (DPI), загруженность каналов за период. Отчёты можно экспортировать в CSV и PDF, а также настроить автоматическую рассылку по email по расписанию.\n\nАудит (audit-backend) — нередактируемый журнал действий всех администраторов NGFW. Фиксирует: входы и выходы из системы (с IP-адресом), каждое изменение любой настройки (с деталями что именно изменилось, в формате «было → стало»). Нужен для расследования инцидентов и соответствия требованиям регуляторов (ФСТЭК, ФСБ).\n\nЖурналирование (logs-backend) — централизованный сбор логов всех сервисов NGFW. Собирает из systemd journal, нормализует в формат Syslog RFC 5424, записывает в ClickHouse. Поддерживает отправку на внешние syslog-серверы (TCP и UDP) для интеграции с корпоративными SIEM-системами. Формат CEF (Common Event Format) для совместимости с ArcSight, QRadar, Splunk.\n\nВнешние серверы (servers-backend) — конфигурация адресов внешних сервисов, с которыми взаимодействует NGFW: syslog-коллекторы для отправки логов, NTP-серверы для синхронизации времени, DNS upstream серверы для форвардинга запросов. Эти настройки используются другими модулями через общую библиотеку servers-lib.",
              auth_c:"Идентификация пользователей и управление доступом в интернет.\n\nЧтобы пользователь получил доступ в интернет через NGFW, он должен быть авторизован — это обязательное условие. Для работы внутри локальной сети авторизация не требуется. Каждая сессия авторизации привязана к IP-адресу устройства.\n\nМодуль отвечает за учётные записи (локальные и из внешних каталогов), методы аутентификации и правила авторизации.\n\nУчётные записи: создание локальных пользователей и групп, импорт из внешних каталогов — Active Directory, ALD Pro, FreeIPA, RADIUS-сервер.\n\nАутентификация: проверка личности пользователя. Поддерживаются одновременно несколько методов — веб-аутентификация (captive portal), SSO (прозрачная, без ввода пароля), аутентификация через журналы AD, через Ideco Client, по IP/MAC-адресу, по подсети. Двухфакторная аутентификация для дополнительной защиты.\n\nАвторизация: после аутентификации определяются права доступа — через VPN, через Ideco Client без туннеля, для терминальных серверов, через журналы AD, через веб. Количество одновременных сессий ограничивается (1-6), неактивные сессии завершаются по тайм-ауту.\n\nТакже включает: Ideco Client (фирменный VPN-клиент с push-профилями), профили устройств (проверка подключаемых устройств), обнаружение устройств в сети.",
              fw_c:"Управление правилами фильтрации трафика и объектная модель.\n\nМежсетевой экран — основной инструмент управления трафиком в NGFW. Поддерживает фильтрацию пакетов с контролем состояния соединений (Stateful Inspection): решение о блокировке принимается один раз при установлении соединения и действует на весь обмен данными в рамках этого соединения.\n\nМСЭ анализирует заголовки IP-пакетов и TCP-сегментов, фильтруя трафик по IP-адресам, портам и протоколам. Правила создаются в четырёх таблицах:\n— FORWARD: фильтрация транзитного трафика (основная таблица)\n— INPUT: фильтрация трафика к самому NGFW\n— DNAT: проброс портов, подмена IP/порта назначения для публикации внутренних сервисов\n— SNAT: подмена IP-адреса источника (NAT)\n\nДля работы DPI и IPS к разрешающим правилам подключаются профили безопасности — наборы параметров для контроля приложений, предотвращения вторжений, WAF и антивируса. Профили применяются независимо друг от друга.\n\nМСЭ использует зоны — логические объединения сетевых интерфейсов, что упрощает управление правилами при большом количестве интерфейсов. Одна зона может содержать до 64 интерфейсов.\n\nДополнительно: предварительная фильтрация (pre-filter, до основного МСЭ), аппаратная фильтрация, ограничение скорости (QoS), тестирование правил, логирование срабатываний.\n\nОбъекты (alias): IP-группы, подсети, сервисы, расписания, зоны, алиасы AD/ALD — переиспользуются во всех правилах.\n\nТакже включает конфигурацию ACL-трансляции (перевод правил в eBPF/VPP ACL для Data Plane) и конфигурацию VPP.",
              net_c:"Сетевые сервисы: интерфейсы, DNS, DHCP.\n\nМодуль отвечает за базовую сетевую инфраструктуру NGFW — всё что нужно для того, чтобы устройства в сети получали IP-адреса, резолвили доменные имена и были правильно связаны на канальном уровне.\n\nСетевые интерфейсы (L2-manager): управление физическими (Ethernet) и логическими (VLAN 802.1Q, Bond-агрегация каналов, Bridge-мосты) интерфейсами. В высокопроизводительном режиме VCE создаёт KNI-интерфейсы для связи VPP с Linux.\n\nDNS-сервер: встроенный DNS на базе Unbound. Преобразует доменные имена в IP-адреса для всех устройств в сети. В большинстве случаев не требует дополнительной настройки. Поддерживает кэширование, DNS-over-HTTPS, пользовательские зоны и записи.\n\nDHCP-сервер: автоматическое назначение IP-адресов устройствам в локальной сети. Настройка пулов адресов по интерфейсам, статическое резервирование по MAC, DHCP relay для удалённых подсетей.\n\nIGMP Proxy: позволяет принимать мультикаст-трафик от провайдера (IPTV). Проксирует IGMP-подписки между внешним и локальными интерфейсами.\n\nОбнаружение устройств: ARP-сканирование для инвентаризации сети.",
              sec_c:"Конфигурация модулей безопасности.\n\nМодуль объединяет настройку всех компонентов, которые инспектируют содержимое трафика — не только заголовки пакетов (как МСЭ), но и данные внутри: URL-адреса, файлы, контент веб-страниц, HTTP-запросы.\n\nКонтент-фильтр: проверяет запрашиваемые сайты по базе URL-адресов. Если адрес найден в запрещённой категории — доступ блокируется, пользователь видит страницу блокировки. Работает на прикладном уровне (HTTP/HTTPS). Для полной фильтрации HTTPS необходима расшифровка трафика (SSL Bump). Без расшифровки фильтрация HTTPS возможна только по домену, не по полному URL. Включает пользовательские категории, переопределение категорий, морфологические словари для фильтрации по ключевым словам.\n\nIPS (Предотвращение вторжений): конфигурация правил Suricata — группы сигнатур, пользовательские сигнатуры, профили для привязки к правилам МСЭ.\n\nАнтивирус: конфигурация проверки файлов в веб-трафике. Интеграция Kaspersky Anti-Virus SDK.\n\nWAF: конфигурация Web Application Firewall для защиты опубликованных веб-ресурсов от атак (SQL-инъекции, XSS).\n\nПрокси: конфигурация прозрачного проксирования веб-трафика. HTTPS-фильтрация (расшифровка TLS), eCAP-модули.\n\nОбратный прокси: публикация внутренних веб-ресурсов в интернет через Nginx с TLS-терминацией и Let's Encrypt.",
              vpn_c:"VPN-подключения и туннели между площадками.\n\nМодуль управляет всеми видами VPN — как для удалённого доступа отдельных пользователей, так и для объединения офисов.\n\nVPN-серверы для удалённого доступа: настройка подключений по протоколам IKEv2/IPSec, L2TP/IPSec, SSTP. Пользователи подключаются с любых устройств (Windows, macOS, Linux, iOS, Android). Автоматическая генерация профилей подключения.\n\nIdeco Client: фирменный VPN-клиент для простого подключения пользователей. Установил → подключился в один клик. Push-профили обновляются автоматически. Поддерживает Device VPN и профили устройств для проверки подключаемых устройств.\n\nWireGuard: высокопроизводительный VPN-протокол. Генерация ключей и QR-кодов для мобильных устройств.\n\nIPSec site-to-site: защищённые туннели между площадками (двумя NGFW или NGFW и оборудованием других вендоров).\n\nГОСТ VPN: соединение двух устройств NGFW с шифрованием по ГОСТ Р 34.12-2015 (Кузнечик/Магма). Для КИИ и организаций с требованиями ФСБ к криптографии.",
              rt_c:"Маршрутизация трафика и почтовый сервис.\n\nМаршрутизация определяет, куда направить каждый пакет. При поступлении пакета маршрут ищется последовательно: сначала проверяется, принадлежит ли адрес локальной подсети (direct connected), затем PBR, статические маршруты и динамические протоколы, маршрутизация внешних сетей и балансировка.\n\nPBR (Policy Based Routing): маршрутизация по политикам — направление трафика по заданным условиям (источник, интерфейс) на указанный маршрут. Используется только для прямого направления.\n\nСтатическая маршрутизация: ручное задание маршрутов.\n\nBGP: обмен информацией о доступности сетей с внешними маршрутизаторами (провайдеры, другие площадки).\n\nOSPF: динамическая маршрутизация внутри локальных сетей.\n\nМаршрутизация внешних сетей: политики направления трафика к внешним шлюзам.\n\nБалансировка и резервирование: распределение трафика между несколькими каналами или автоматическое переключение на резервный при падении основного.\n\nВажно: если маршрут найден на любом из этапов — пакет передаётся в межсетевой экран. Результат маршрутизации фиксируется и не изменяется при последующей обработке.\n\nПочтовый релей: настройка почтовой службы — SMTP relay, DKIM/SPF, уведомления и рассылка отчётов.",
              dp_core:"Ядро обработки сетевого трафика и базовые сетевые сервисы.\n\nЭтот модуль — точка входа для каждого пакета, проходящего через NGFW. Здесь пакет впервые принимается, маршрутизируется и направляется дальше по цепочке обработки.\n\nVPP (Vector Packet Processing) — userspace сетевой стек от проекта fd.io. Работает в обход ядра Linux, забирая пакеты напрямую с сетевых карт через DPDK (Poll Mode Driver) или AF_XDP. Обрабатывает пакеты не по одному, а пачками (vectors) через граф узлов, что кратно повышает производительность. Используется в высокопроизводительном режиме VCE. Связан с Linux через KNI-интерфейсы (Kernel Network Interface) — они нужны для передачи трафика сервисам, работающим в ядре (Suricata, Squid, FRRouting).\n\nUnbound — DNS-сервер (daemon). Обслуживает DNS-запросы от всех устройств в сети. Работает как рекурсивный резолвер (полный обход DNS-дерева), форвардер (проксирует на upstream DNS) или авторитативный сервер для локальных зон. Кэширует ответы для ускорения повторных запросов. Поддерживает DNS-over-HTTPS (DoH) и DNSSEC.\n\nISC DHCP — DHCP-сервер (daemon). Автоматически выдаёт IP-адреса устройствам в локальной сети из настроенных пулов. Поддерживает статическое резервирование по MAC-адресу и relay для удалённых подсетей.\n\nВсе daemon'ы этого модуля получают конфигурацию от соответствующих бэкендов Control Plane через etcd.",
              dp_ips:"IPS-инспекция, прокси-обработка и антивирусная проверка веб-трафика.\n\nМодуль объединяет компоненты, которые анализируют содержимое трафика на прикладном уровне — не только заголовки пакетов, но и данные внутри: HTTP-запросы, URL-адреса, файлы, HTML-контент.\n\nSuricata — система предотвращения вторжений (IPS). Получает трафик через NFQUEUE после L3-обработки в межсетевом экране. Проверяет каждый пакет по базе сигнатур (ET Open — бесплатные, ET Pro — по подписке, Snort-совместимые). При обнаружении атаки может заблокировать пакет (Drop) или зафиксировать алерт (Alert). L7-инспекция анализирует каждый пакет в рамках соединения — в отличие от МСЭ, который принимает решение один раз при установлении соединения.\n\nSquid — HTTP/HTTPS прокси-сервер. Используется не только для проксирования, но и как платформа для работы других модулей безопасности: контент-фильтра, антивируса, системы отчётности по веб-трафику. Работает в прозрачном режиме (TPROXY — перехват без настройки на клиенте) или с прямым подключением. Для фильтрации HTTPS расшифровывает TLS-трафик (SSL Bump) — при этом на клиентах должен быть установлен корневой сертификат NGFW. Без расшифровки HTTPS фильтруется только по домену, не по полному URL.\n\neCAP-модули — плагины Squid, работающие in-process (без сетевых вызовов): ecap-av (антивирусная проверка файлов через ClamAV/Kaspersky), ecap-urls (URL-фильтрация по базе из RocksDB), морфологический анализ контента страниц.\n\nModSecurity — WAF (Web Application Firewall). Работает в связке с Nginx (обратный прокси). Защищает опубликованные веб-ресурсы от атак из OWASP Top 10: SQL-инъекции, XSS, CSRF.",
              dp_dpi:"Глубокая инспекция пакетов (DPI) и сбор статистики трафика.\n\nМодуль отвечает за идентификацию приложений на уровне L7 и сбор детальной статистики о трафике, проходящем через NGFW.\n\nDPI / Контроль приложений (app-control-nfq) — определяет, какое именно приложение или протокол генерирует трафик, анализируя содержимое пакетов через nDPI. Распознаёт более 300 приложений и протоколов: мессенджеры (Telegram, WhatsApp), видео (YouTube, TikTok), торренты (BitTorrent), игры и многое другое. Получает трафик через NFQUEUE. Профили контроля приложений привязываются к разрешающим правилам межсетевого экрана — это позволяет применять разные политики DPI для разных сегментов сети.\n\nFlow-stat-server и flow-stat-exporter — сбор и экспорт DPI-статистики. Flow-stat-server принимает данные от DPI (какое приложение, сколько трафика, откуда-куда) и агрегирует в памяти. Flow-stat-exporter записывает агрегированные данные в ClickHouse batch-вставками для минимизации нагрузки.\n\nTrafmond — мониторинг сетевых соединений в реальном времени. Читает таблицу conntrack (все активные NAT/stateful-соединения через NGFW) и кэширует DNS-ответы для обогащения — чтобы в интерфейсе показывать не просто IP-адреса, а имена сайтов.",
              dp_acl:"ACL-фильтрация, маршрутизация, VPN-туннели и отказоустойчивость.\n\nМодуль объединяет низкоуровневые компоненты, которые работают на сетевом и канальном уровне: применяют правила фильтрации, устанавливают VPN-туннели, управляют маршрутизацией и обеспечивают переключение при отказе.\n\neBPF / XDP (bpf-acl-rules) — высокоскоростная фильтрация на уровне eXpress Data Path. eBPF-программа загружается прямо в драйвер сетевой карты и обрабатывает пакеты ДО сетевого стека Linux, обеспечивая фильтрацию на аппаратной скорости (миллионы пакетов в секунду). Используется в классическом режиме VCE. Правила загружаются из acl-backend через eBPF maps.\n\nNFLOG (ideco-nflog) — захват событий accept/drop из межсетевого экрана. Когда правило МСЭ срабатывает, информация о пакете (кто, куда, какое правило, действие) записывается в ClickHouse для журнала МСЭ и отчётов.\n\nstrongSwan — IPSec/IKEv2 VPN daemon (charon). Устанавливает и обслуживает шифрованные туннели: удалённый доступ пользователей (IKEv2, L2TP/IPSec) и site-to-site соединения между площадками.\n\nFRRouting — набор daemon'ов маршрутизации (zebra, bgpd, ospfd). Zebra управляет таблицей маршрутизации Linux, bgpd обменивается маршрутами с провайдерами и другими площадками по BGP, ospfd обеспечивает динамическую маршрутизацию внутри сети по OSPF.\n\nKeepalived — VRRP daemon для отказоустойчивого кластера Active-Passive. Отправляет heartbeat между двумя нодами NGFW. При пропуске heartbeat'ов резервная нода автоматически забирает виртуальные IP-адреса и становится активной. Время переключения — несколько секунд.",
              sys_i:"Ядро системы, управление сервером, лицензии, обновления, PKI, VCE.\n\nМодуль объединяет всё, что обеспечивает жизненный цикл NGFW как продукта: от первоначальной установки и лицензирования до обновлений, бэкапов и масштабирования через виртуальные контексты.\n\nЯдро (system-backend): базовые настройки сервера — часовой пояс, язык, администраторы (локальные или из AD/ALD Pro/RADIUS), терминал для диагностики прямо из браузера. Мониторинг здоровья: CPU, RAM, диски — при превышении пороговых значений система отправляет уведомление.\n\nЛицензирование: привязка лицензии к серверу (онлайн или офлайн). Лицензия определяет максимальное количество одновременно авторизованных пользователей и доступность модулей (IPS, антивирус, контент-фильтр). Лицензия общая между системным контекстом и всеми VCE.\n\nОбновления: автоматическое обновление ОС, ядра и баз безопасности (IPS-сигнатуры, антивирус, URL-категории, GeoIP).\n\nБэкапы: создание и восстановление резервных копий конфигурации. Бэкап системного контекста не включает данные дочерних VCE — для каждого VCE нужен отдельный бэкап.\n\nPKI / Сертификаты (cert-backend): управление SSL-сертификатами. При первом запуске NGFW автоматически генерирует корневой самоподписанный сертификат. Для каждого модуля (обратный прокси, VPN-серверы IKEv2/SSTP, веб-интерфейс, веб-аутентификация, почта) автоматически создаётся цепочка сертификатов, подписанная этим корневым. Параллельно NGFW пытается получить сертификат Let's Encrypt — при успехе он заменяет самоподписанный. Сертификаты Let's Encrypt выпускаются на 3 месяца и перевыпускаются автоматически. Можно загрузить собственные сертификаты (пользовательские или корневые).\n\nVCE (virtual context engine): создание виртуальных серверов (контекстов) на одном физическом NGFW. Реализовано на базе контейнеров Linux (systemd-nspawn). Позволяет разделить одну сеть на несколько независимых — каждая со своими правилами, пользователями, политиками безопасности. Два типа: Классический (VCE NGFW) — минимум 8 ГБ RAM и 2 ядра, и Высокопроизводительный (VCE VPP) — минимум 8 ГБ RAM и 4 ядра, обработка трафика через VPP. Контексты изолированы по ресурсам CPU и памяти, но интерфейсы и зоны настраиваются из системного контекста. Это не Multitenancy — не предоставляйте доступ к VCE сторонним организациям.\n\nIdeco Center: централизованное управление парком устройств NGFW из одного интерфейса.",
              ha_i:"Отказоустойчивый кластер.\n\nКластеризация позволяет объединить два сервера Ideco NGFW в кластер Active-Passive. Один сервер (Master) обрабатывает весь трафик, второй (Standby) находится в горячем резерве.\n\nПри отказе активного сервера — сбой оборудования, падение сетевого интерфейса, зависание — резервный автоматически забирает виртуальные IP-адреса и становится активным. Механизм переключения — VRRP (keepalived): Master отправляет heartbeat, при пропуске heartbeat'ов Standby берёт на себя роль Master. Время переключения — несколько секунд.\n\nКонфигурация синхронизируется между нодами через etcd: при изменении настроек на Master они автоматически применяются на Standby. Также поддерживается ручное переключение — для планового обслуживания одного из серверов.\n\nВажно: создание кластера недоступно внутри VCE — только на уровне системного контекста.",
              db_i:"Хранилища данных — основа всех уровней архитектуры.\n\nВсе компоненты NGFW хранят и обмениваются данными через семь специализированных хранилищ, каждое из которых выбрано под свою задачу.\n\netcd PERMANENT: распределённое key-value хранилище для всей постоянной конфигурации NGFW — правила МСЭ, объекты, настройки модулей, учётные записи. Сохраняется при перезагрузке. Все Python-бэкенды подключены через общий Backend class. Основной паттерн взаимодействия: один бэкенд записывает изменение → другие бэкенды и daemon'ы получают уведомление через etcd watch → реагируют (write → watch → react). Именно через etcd бэкенды «общаются» друг с другом, не вызывая API напрямую.\n\netcd RUNTIME: оперативные данные, которые пересоздаются при каждом старте — текущее состояние сетевых интерфейсов (link up/down, скорость, MTU), активные сессии авторизации, статусы бэкендов, текущие VPN-соединения. Используется для отображения реального состояния системы в веб-интерфейсе.\n\nClickHouse: колоночная СУБД для аналитики и логов. Хранит все исторические данные: журнал МСЭ (accept/drop), DNS-запросы, IPS-алерты, WAF-события, DPI-статистику по приложениям, веб-трафик по пользователям. 14+ бэкендов пишут данные, reports-backend читает для построения отчётов.\n\nSQLite: AD кэш — кэш пользователей и групп Active Directory в ad-backend. Позволяет аутентифицировать пользователей при недоступности контроллера домена.\n\nSQLite: Users — локальные учётные записи пользователей, группы, квоты в user-backend.\n\nSQLite: IPS — пользовательские правила IPS (созданные администратором вручную) в suricata-backend.\n\nRocksDB: высокоскоростное key-value хранилище для базы URL-категорий контент-фильтра. 145 категорий, миллионы URL. Lookup за микросекунды — критично для inline-фильтрации в eCAP-модуле Squid. Обновляется из облака Ideco по подписке."};

var C=[
{id:"web",n:"web-backend",s:"Веб-интерфейс",dom:"ui",sk:"both",lang:"Python",fw:"aiohttp",desc:"Веб-интерфейс администратора NGFW.\n\nNginx (статика, проксирование) + aiohttp (async API). Полное управление всеми модулями системы.\n\nРолевая модель: суперадминистратор (полный доступ), администратор МСЭ (правила, сеть), администратор ИБ (IPS, AV, CF, WAF), аудитор (только просмотр).\n\n2FA для входа: TOTP, SMS (SMS Aero), Multifactor. Telegram-бот: push-уведомления об IPS-алертах, падении каналов, изменениях конфигурации.",det:["Nginx+aiohttp","2FA","Telegram"]},
{id:"cabinet",n:"user-cabinet-backend",s:"Личный кабинет",dom:"ui",sk:"both",lang:"Python",fw:"aiohttp",desc:"Личный кабинет пользователя.\n\nПортал самообслуживания — отдельный URL, доступен авторизованным пользователям сети.\n\nСмена пароля учётной записи. Персональная статистика: объём трафика, категории посещённых сайтов, история блокировок контент-фильтра.\n\nСкачивание VPN-профилей для Ideco Client и стандартных клиентов (.ovpn, .mobileconfig, .conf).\n\nSSL VPN портал: доступ к внутренним веб-ресурсам организации прямо из браузера, без установки VPN-клиента.",det:["Пароль","VPN-профили"]},
{id:"restapi",n:"rest-api-backend",s:"REST API",dom:"api_d",sk:"both",lang:"Python",fw:"aiohttp",desc:"REST API для внешней автоматизации.\n\nПрограммный интерфейс на основе OpenAPI. Покрывает все функции веб-интерфейса: CRUD правил МСЭ, управление пользователями и группами, VPN-конфигурации, объекты alias, метрики и события.\n\nСценарии: SIEM — получение событий безопасности и автоблокировка IP по IoC. SOAR — автоматическое реагирование на инциденты. DevOps/IaC — конфигурация NGFW как код (Terraform, Ansible).\n\nДоступ через API-ключи. Rate limiting.",det:["OpenAPI","SIEM/SOAR"]},
{id:"monitor",n:"monitor-backend",s:"Мониторинг",dom:"api_d",sk:"both",lang:"Python",fw:"aiohttp, pysnmp",desc:"Мониторинг состояния NGFW.\n\nСбор системных метрик: CPU (по ядрам), RAM (used/cached/swap), диски (IOPS, usage), сетевые интерфейсы (bps, pps, errors, drops). Метрики записываются в ClickHouse для графиков загруженности за произвольный период.\n\nИнтеграция: Zabbix-agent (push метрик), SNMP v2c/v3 (get/walk/traps для NMS).\n\nHealthcheck всех внутренних сервисов. Проверка репутации IP-адресов и доменов через облачный сервис Ideco.\n\nОповещения (alerts-lib): уведомления при превышении пороговых значений.",det:["Метрики→CH","Zabbix/SNMP"]},
{id:"reports",n:"reports-backend",s:"Отчёты",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp, clickhouse-driver",desc:"Конструктор отчётов и аналитика.\n\nГотовые шаблоны: журнал МСЭ (accept/drop по правилам), статистика веб-трафика (сайты, категории, пользователи), IPS-алерты (сигнатуры, severity), DPI (приложения, объёмы), загруженность каналов (bps/pps по интерфейсам).\n\nИсточник — ClickHouse с Materialized Views для быстрой агрегации.\n\nЭкспорт: CSV (для анализа), PDF (для руководства). Автоматическая рассылка по email по расписанию.\n\n15+ lib-зависимостей — самый связанный бэкенд, собирает данные из всех доменов.",det:["Конструктор","CSV/PDF"]},
{id:"audit",n:"audit-backend",s:"Аудит",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Журнал действий администраторов.\n\nНередактируемый аудит-лог. Фиксирует: входы/выходы (IP + геолокация через GeoIP), каждое изменение настроек (diff «было → стало» в JSON), создание и удаление правил, изменение ролей.\n\nДанные в ClickHouse, TTL 365 дней. Фильтрация по администратору, типу действия, модулю, периоду.\n\nНеобходим для соответствия требованиям ФСТЭК и ФСБ.",det:["Diff","ФСТЭК"]},
{id:"logs",n:"logs-backend",s:"Журналы",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Централизованный сбор логов.\n\nВсе сервисы NGFW пишут в systemd journal. logs-backend собирает, нормализует в Syslog RFC 5424 и записывает в ClickHouse для хранения и поиска.\n\nОтправка на внешние syslog-серверы: TCP (reliable) и UDP. Формат CEF (Common Event Format) для интеграции с корпоративными SIEM — ArcSight, QRadar, Splunk.\n\nРотация по размеру и времени. Сжатие LZ4 в ClickHouse.",det:["Syslog→CH"]},
{id:"servers",n:"servers-backend",s:"Внешние серверы",dom:"rpt",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация внешних серверов.\n\nАдреса внешних сервисов, с которыми взаимодействует NGFW:\n— Syslog-серверы: коллекторы для отправки логов (TCP/UDP, формат RFC 5424, CEF), фильтры по severity\n— NTP-серверы: источники синхронизации времени\n— DNS upstream: серверы для форвардинга DNS-запросов, DoH endpoints\n\nНастройки хранятся в etcd PERMANENT и доступны другим модулям через servers-lib.",det:["Syslog/NTP"]},
{id:"auth",n:"auth-backend",s:"Аутентификация",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, gssapi",desc:"Ядро аутентификации и авторизации.\n\nАвторизация — обязательное условие для доступа пользователя в интернет. Для работы внутри локальной сети авторизация не требуется.\n\nПоддерживает одновременно несколько методов: веб-аутентификация (captive portal), SSO (прозрачная, без ввода пароля), через журналы AD, через Ideco Client, по IP/MAC-адресу, по подсети. 2FA для дополнительной защиты.\n\nСессия авторизации привязана к IP-адресу. У одного пользователя может быть несколько сессий (до 6). Неактивные сессии завершаются по тайм-ауту.\n\n12 lib-зависимостей — самый связанный бэкенд Control Plane.",det:["SSO/NTLM/RADIUS","2FA"]},
{id:"ad",n:"ad-backend",s:"Active Directory",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, ldap3",desc:"Интеграция с Active Directory.\n\nИмпорт пользователей и групп через LDAP/LDAPS. Поддержка нескольких доменов одновременно (мульти-домен). Инкрементальная синхронизация по USN Changed — обновляются только изменённые записи.\n\nKerberos SSO: прозрачная аутентификация через keytab/SPN. NTLM: fallback через Samba winbind.\n\nSQLite кэш: при недоступности контроллера домена пользователи аутентифицируются по кэшированным данным. Обновление: периодически по cron + по событию через etcd watch.",det:["LDAP","Kerberos"]},
{id:"ald",n:"ald-backend",s:"ALD Pro",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Интеграция с ALD Pro и FreeIPA.\n\nИмпорт учётных записей и групп через LDAP. Kerberos SSO для прозрачной аутентификации.\n\nАктуально для организаций на Astra Linux и ALT Linux — импортозамещение в госсекторе и КИИ.",det:["ALD/FreeIPA"]},
{id:"user",n:"user-backend",s:"Пользователи",dom:"auth_c",sk:"both",lang:"Python",fw:"aiohttp, bcrypt",desc:"Локальные учётные записи.\n\nCRUD пользователей и групп, не связанных с AD/ALD. Квоты трафика: ограничение объёма за период, действие при превышении (блокировка или уведомление).\n\nХранение в SQLite (пароли — bcrypt). Импорт из CSV.",det:["CRUD","SQLite"]},
{id:"webauthd",n:"web-authd",s:"Captive Portal",dom:"auth_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"Daemon captive portal.\n\nПерехватывает HTTP-трафик неавторизованных пользователей через iptables REDIRECT и перенаправляет (302) на страницу входа.\n\nПосле успешной аутентификации создаёт сессию через auth-backend.\n\nТолько классический контекст — в высокопроизводительном VCE используется другой механизм перехвата.",det:["iptables"]},
{id:"vpnauthd",n:"vpn-authd",s:"VPN-аутент.",dom:"auth_c",sk:"both",lang:"Python",fw:"daemon",desc:"Аутентификация VPN-клиентов.\n\nВызывается strongSwan (через xauth/eap plugin) при подключении IKEv2/L2TP и OpenVPN (через auth-user-pass-verify).\n\nПроверяет логин/пароль через auth-backend, применяет 2FA если настроено. Возвращает IP-адрес и маршруты для клиента.",det:["xauth/eap"]},
{id:"fw",n:"firewall-backend",s:"МСЭ",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp, nftables",desc:"Межсетевой экран — основной инструмент управления трафиком.\n\nStateful-фильтрация (Stateful Inspection): решение о блокировке принимается один раз при установлении соединения и действует на весь обмен данными.\n\nЧетыре таблицы правил:\n— FORWARD: фильтрация транзитного трафика между сетями\n— INPUT: трафик к самому NGFW (DNS, VPN, прокси)\n— DNAT: проброс портов, подмена IP/порта назначения\n— SNAT: подмена IP-адреса источника (NAT)\n\nК разрешающим правилам подключаются профили безопасности — контроль приложений (DPI) и предотвращение вторжений (IPS). Фильтрация по зонам (логические объединения интерфейсов, до 64 на зону).\n\n12 lib-зависимостей.",det:["FORWARD/INPUT/DNAT/SNAT"]},
{id:"cfw",n:"cfw-backend",s:"Custom FW",dom:"fw_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"Пользовательские правила nftables.\n\nPre-filter: выполняются ДО основного межсетевого экрана. Для нестандартных сценариев, не покрываемых стандартным интерфейсом: GeoIP-блокировка, специфический NAT, интеграция с внешними IDS.\n\nТолько классический контекст.",det:["Pre-filter"]},
{id:"alias",n:"alias-backend",s:"Объекты (38+)",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Объектная модель NGFW — фундамент всех правил.\n\n38+ модулей объектов: IP-адреса, подсети, диапазоны, MAC, FQDN (динамический резолвинг), сервисы (порт/протокол), расписания (временные интервалы), зоны безопасности (LAN/WAN/DMZ — логические группы интерфейсов), алиасы AD/ALD (динамические группы по членству в AD-группах).\n\nОбъекты переиспользуются во всех правилах МСЭ, контент-фильтра, маршрутизации. Изменение объекта автоматически обновляет все правила через etcd watch.\n\nalias-lib импортируют 30+ бэкендов.",det:["38+ модулей"]},
{id:"shaper",n:"shaper-backend",s:"QoS",dom:"fw_c",sk:"classic",lang:"Python",fw:"aiohttp, pyroute2",desc:"Ограничение скорости входящего интернет-трафика.\n\nLinux Traffic Control (tc), дисциплины HTB/HFSC. Привязка к пользователям, группам, IP-адресам. Гарантированная полоса (rate), максимальная (ceil), приоритет.\n\nТолько классический контекст — в высокопроизводительном VCE используется встроенный VPP policer.",det:["tc"]},
{id:"acl",n:"acl-backend",s:"ACL",dom:"fw_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Трансляция правил МСЭ в ACL для Data Plane.\n\nМост между Control Plane и Data Plane. Наблюдает за изменениями правил МСЭ и объектов alias через etcd watch. При каждом изменении разворачивает alias-объекты в конкретные IP/подсети и загружает ACL в eBPF maps (классический контекст) или VPP ACL plugin (высокопроизводительный).\n\nФиксирует события accept/drop через NFLOG → ClickHouse для журнала МСЭ.",det:["eBPF+VPP ACL"]},
{id:"vpp_be",n:"vpp-backend",s:"VPP конфиг",dom:"fw_c",sk:"vpp",lang:"Python",fw:"aiohttp, vpp-api",desc:"Конфигурация VPP (Vector Packet Processing).\n\nУправляет VPP через Python API bindings: настройка интерфейсов, ACL, L2-бриджей. Записывает оперативное состояние интерфейсов (link up/down, скорость, MTU, счётчики) в etcd RUNTIME для отображения в UI.\n\nТолько высокопроизводительный контекст (VCE VPP).",det:["VPP API"]},
{id:"l2",n:"l2-manager",s:"L2",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp, pyroute2",desc:"Управление сетевыми интерфейсами.\n\nТипы: Ethernet (физические порты), VLAN (802.1Q, тегированный трафик), Bond (агрегация каналов — LACP, active-backup), Bridge (L2-мосты).\n\nВ высокопроизводительном режиме создаёт KNI-интерфейсы для связи VPP (userspace) с Linux kernel — они нужны для Suricata, Squid, FRRouting.\n\nИспользует pyroute2 для управления через Netlink API. 7 lib-зависимостей.",det:["Eth/VLAN/Bond"]},
{id:"dns_be",n:"dns-backend",s:"DNS конфиг",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация DNS-сервера Unbound.\n\nDNS преобразует доменные имена в IP-адреса. Встроенный сервер не требует дополнительной настройки в большинстве случаев.\n\nРежимы: рекурсивный резолвер, форвардер (upstream DNS), авторитативный (локальные зоны). Кэширование с prefetch, DNS-over-HTTPS (DoH), DNSSEC.\n\nПользовательские зоны и записи (A/AAAA/CNAME/MX/TXT/SRV). Логирование DNS-запросов → ClickHouse. 8 lib-зависимостей.",det:["DoH/DNSSEC"]},
{id:"dhcp_be",n:"dhcp-server-backend",s:"DHCP конфиг",dom:"net_c",sk:"both",lang:"Python",desc:"Конфигурация DHCP-сервера ISC DHCP.\n\nАвтоматическое назначение IP-адресов устройствам в локальной сети. Пулы адресов по интерфейсам и VLAN. Статическое резервирование по MAC-адресу.\n\nDHCP relay: проксирование запросов между подсетями для удалённых VLAN. Dynamic DNS: автоматическое создание A-записей при выдаче IP. Опции: шлюз, DNS, NTP, домен, TFTP (PXE). 6 lib-зависимостей.",fw:"aiohttp",det:["Пулы/relay"]},
{id:"netscan",n:"netscan-backend",s:"Сканер",dom:"net_c",sk:"both",lang:"Python",fw:"aiohttp, scapy",desc:"Обнаружение устройств в сети.\n\nARP-сканирование: рассылка ARP-запросов, сбор ответов для обнаружения активных устройств. OS Fingerprinting: определение типа ОС по TTL, TCP window size, TCP options. MAC OUI: определение производителя по первым 3 байтам MAC-адреса.\n\nРезультаты используются для инвентаризации и обнаружения неавторизованных устройств.",det:["ARP"]},
{id:"igmp",n:"igmpproxy-backend",s:"IGMP",dom:"net_c",sk:"classic",lang:"Python",fw:"aiohttp",desc:"IGMP Proxy — мультикаст-проксирование.\n\nПозволяет принимать мультикаст-трафик от провайдера (IPTV). Транслирует IGMP-подписки (Join/Leave) между upstream (WAN) и downstream (LAN) интерфейсами.\n\nБез этого модуля мультикаст-трафик не проходит через NGFW. Только классический контекст.",det:["IPTV"]},
{id:"cf",n:"content-filter-backend",s:"Контент-фильтр",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp, rocksdb",desc:"Контент-фильтр — проверка запрашиваемых URL.\n\nПроверяет сайты по базе URL-адресов из 145 категорий (соцсети, азартные игры, фишинг, порно, экстремизм и др.). Если адрес в запрещённой категории — блокировка со страницей уведомления.\n\nРаботает на прикладном уровне (HTTP/HTTPS). Без расшифровки HTTPS фильтрует только по домену, не по полному URL.\n\nПользовательские категории, переопределение категорий, морфологические словари (фильтрация по ключевым словам). Safe Search для поисковиков.\n\nБаза в RocksDB, обновляется из облака Ideco. 7 lib-зависимостей.",det:["145 кат."]},
{id:"suricata_be",n:"suricata-backend",s:"IPS конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация IPS (Suricata).\n\nУправление правилами предотвращения вторжений: группы сигнатур (ET Open — бесплатные, ET Pro — по подписке, Snort-совместимые), пользовательские сигнатуры.\n\nIPS-профили: наборы параметров, привязываемые к разрешающим правилам МСЭ — разные профили для разных сегментов сети.\n\nАлерты → ClickHouse. Пользовательские правила → SQLite. 9 lib-зависимостей.",det:["ET/Snort"]},
{id:"av",n:"av-backend",s:"AV конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация антивируса для веб-трафика.\n\nДва движка: Kaspersky Anti-Virus SDK (по лицензии) и ClamAV (бесплатный). Проверка файлов при скачивании через HTTP/HTTPS.\n\nРаботает через eCAP-модуль в Squid (in-process, без ICAP-сервера). 5 lib-зависимостей.",det:["ClamAV/Kaspersky"]},
{id:"waf_be",n:"waf-backend",s:"WAF конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация WAF (Web Application Firewall).\n\nЗащита опубликованных через обратный прокси веб-ресурсов от атак: SQL-инъекции, XSS, CSRF, Path Traversal (OWASP Top 10).\n\nОснова: ModSecurity + OWASP Core Rule Set. Режимы: prevention (блокировка) и detection (только логирование). WAF-профили привязываются к публикациям в обратном прокси. 4 lib-зависимости.",det:["ModSecurity"]},
{id:"proxy_be",n:"proxy-backend",s:"Прокси конфиг",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация прокси-сервера Squid.\n\nПрокси используется не только для проксирования, но и как платформа для контент-фильтра, антивируса и отчётности по веб-трафику.\n\nРежимы: прозрачный (TPROXY — перехват без настройки клиента, достаточно указать NGFW шлюзом) и прямые подключения.\n\nHTTPS-фильтрация: расшифровка TLS-трафика (SSL Bump) — требует установки корневого сертификата NGFW на клиенты. Режимы: bump (полная расшифровка), splice (пропуск), peek (проверка SNI без расшифровки).\n\nICap, WCCP поддержка. 9 lib-зависимостей.",det:["TPROXY/SSL Bump"]},
{id:"reverse",n:"reverse-backend",s:"Обр.прокси",dom:"sec_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Обратный прокси — публикация внутренних веб-ресурсов.\n\nПозволяет сделать веб-ресурсы локальной сети доступными из интернета. Nginx reverse proxy с TLS-терминацией.\n\nАвтоматические сертификаты Let's Encrypt (ACME, HTTP-01 challenge) — при наличии доменного имени на статическом белом IP и открытого 80 TCP-порта.\n\nИнтеграция с WAF для защиты публикуемых приложений. 7 lib-зависимостей.",det:["Let's Encrypt"]},
{id:"vpnsrv",n:"vpn-servers-backend",s:"VPN-серверы",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"VPN-серверы для удалённого доступа.\n\nПротоколы: IKEv2/IPSec (нативная поддержка в Windows/macOS/iOS), L2TP/IPSec (совместимость), SSTP (через HTTPS:443, обход блокировок VPN).\n\nАвтогенерация профилей подключения. Правила авторизации определяют, кто может подключаться: по пользователям, группам, группам безопасности AD, LDAP-фильтрам.\n\n11 lib-зависимостей.",det:["5 протоколов"]},
{id:"ipsec",n:"ipsec-backend",s:"IPSec s2s",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"IPSec site-to-site — туннели между площадками.\n\nЗащищённое соединение двух NGFW или NGFW с оборудованием другого вендора. IKEv1 (совместимость) / IKEv2 (рекомендуемый).\n\nSA: Phase 1 (аутентификация, DH exchange) и Phase 2 (шифрование трафика). DPD (обнаружение падения), PFS (новые ключи для каждой сессии), NAT-T (работа через NAT).\n\n12 lib-зависимостей.",det:["IKEv1/v2"]},
{id:"gostvpn",n:"gost-vpn-backend",s:"ГОСТ VPN",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"ГОСТ VPN — соединение двух устройств NGFW.\n\nШифрование по ГОСТ Р 34.12-2015: алгоритмы Кузнечик (128 бит) и Магма (64 бит).\n\nДля организаций КИИ, госорганов и компаний с требованиями ФСБ к криптографии.",det:["ГОСТ"]},
{id:"agent",n:"agent-backend",s:"Ideco Client",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Управление Ideco Client.\n\nФирменный VPN-клиент: установил → подключился в один клик. Push-профили: сервер автоматически отправляет обновлённые настройки. Поддержка Device VPN и профилей устройств для проверки подключаемых устройств.\n\nПлатформы: Windows, macOS, Linux, Android, iOS. 10 lib-зависимостей.",det:["Push"]},
{id:"wg",n:"wireguard-backend",s:"WireGuard",dom:"vpn_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Конфигурация WireGuard.\n\nВысокопроизводительный VPN-протокол (kernel-модуль, ~4K строк кода). Современная криптография: Noise Protocol, ChaCha20, Curve25519.\n\nУправление пирами: генерация ключей, настройка allowed IPs. QR-коды для мобильных устройств.",det:["Peers"]},
{id:"routing",n:"routing-backend",s:"Маршрутизация",dom:"rt_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Маршрутизация через FRRouting.\n\nОпределяет путь каждого пакета. Маршрут ищется последовательно: direct connected → PBR → статические/BGP/OSPF → маршрутизация внешних сетей → балансировка.\n\nPBR: маршрутизация по политикам (по источнику, интерфейсу). BGP: обмен маршрутами с провайдерами. OSPF: динамическая маршрутизация внутри сети.\n\nБалансировка и резервирование: распределение трафика между шлюзами или автопереключение на резервный.\n\nЕсли маршрут найден — пакет передаётся в МСЭ. Результат маршрутизации фиксируется и не изменяется при обработке.\n\n12 lib-зависимостей.",det:["BGP/OSPF"]},
{id:"mail",n:"mail-backend",s:"Почта",dom:"rt_c",sk:"both",lang:"Python",fw:"aiohttp",desc:"Почтовый релей.\n\nSMTP relay на Postfix. Используется для email-уведомлений администраторам (IPS-алерты, падение каналов), автоматической рассылки отчётов по расписанию, уведомлений пользователям (истечение квоты, блокировка).\n\nDKIM: цифровая подпись исходящих писем. SPF: публикация DNS-записей для предотвращения подделки отправителя. TLS: шифрование соединений.",det:["Postfix"]},
{id:"vpp_dp",n:"VPP",s:"Userspace DP",dom:"dp_core",sk:"vpp",lang:"C",fw:"fd.io, DPDK",desc:"VPP (Vector Packet Processing) — userspace сетевой стек.\n\nЯдро обработки трафика в высокопроизводительном контексте (VCE VPP). Работает в обход ядра Linux, забирая пакеты напрямую с сетевых карт через DPDK (Poll Mode Driver) или AF_XDP.\n\nОбрабатывает пакеты пачками (vectors) через граф узлов: приём → классификация → L2-bridge/L3-route → ACL → NAT → отправка. Это кратно быстрее поштучной обработки.\n\nKNI-интерфейсы связывают VPP с Linux kernel — нужны для Suricata, Squid, FRRouting, которые работают в ядре.",det:["DPDK","Vector"]},
{id:"unbound_dp",n:"Unbound",s:"DNS daemon",dom:"dp_core",sk:"both",lang:"C",fw:"Unbound",desc:"Unbound — DNS-сервер (daemon).\n\nОбслуживает DNS-запросы от всех устройств в сети. В большинстве случаев не требует дополнительной настройки.\n\nРежимы: рекурсивный резолвер (полный обход DNS-дерева), форвардер (проксирует на upstream), авторитативный (локальные зоны).\n\nКэширование с prefetch (обновление популярных записей до истечения TTL). DNS-over-HTTPS (DoH) для приватности. DNSSEC для валидации подписей.",det:["Кэш","DoH"]},
{id:"dhcpd_dp",n:"ISC DHCP",s:"DHCP daemon",dom:"dp_core",sk:"both",lang:"C",fw:"ISC DHCP",desc:"ISC DHCP — DHCP-сервер (daemon).\n\nАвтоматическая выдача IP-адресов устройствам в локальной сети. Пулы адресов по интерфейсам и VLAN. Статическое резервирование по MAC.\n\nDHCP relay: проксирование запросов между подсетями. Dynamic DNS: автоматическое создание A-записей при выдаче IP.",det:["Пулы"]},
{id:"suricata_dp",n:"Suricata",s:"IPS daemon",dom:"dp_ips",sk:"both",lang:"C",fw:"Suricata",desc:"Suricata — IPS daemon (inline).\n\nПолучает трафик через NFQUEUE после L3-обработки в межсетевом экране. Проверяет каждый пакет по базе сигнатур.\n\nВ отличие от МСЭ (решение один раз при установлении соединения), IPS анализирует каждый пакет внутри соединения и может заблокировать на любом этапе.\n\nПри обнаружении атаки: Drop (блокировка пакета) или Alert (фиксация без блокировки). Алерты записываются в ClickHouse.",det:["NFQUEUE"]},
{id:"squid_dp",n:"Squid",s:"HTTP/S прокси",dom:"dp_ips",sk:"both",lang:"C++",fw:"Squid, libecap",desc:"Squid — HTTP/HTTPS прокси-сервер (daemon).\n\nПлатформа для работы модулей безопасности: контент-фильтра, антивируса, отчётности по веб-трафику.\n\nПрозрачный режим (TPROXY): перехват без настройки на клиенте — достаточно указать NGFW шлюзом. SSL Bump: расшифровка HTTPS для полной фильтрации (без расшифровки — только по домену, не по URL).\n\neCAP-модули работают in-process (без ICAP-сервера): антивирус, URL-фильтрация, морфоанализ.",det:["eCAP"]},
{id:"ecap_av",n:"ecap-av",s:"eCAP: AV",dom:"dp_ips",sk:"both",lang:"C++",fw:"libecap",desc:"eCAP-модуль антивирусной проверки.\n\nPlug-in для Squid через libecap (in-process, без сетевых вызовов). При скачивании файла перехватывает HTTP body и отправляет на проверку в ClamAV (clamd) или Kaspersky (klms) через Unix socket.\n\nПри обнаружении угрозы — блокировка загрузки и страница уведомления пользователю.",det:["clamd"]},
{id:"ecap_urls",n:"ecap-urls",s:"eCAP: URL",dom:"dp_ips",sk:"both",lang:"C++",fw:"libecap, rocksdb",desc:"eCAP-модуль URL-фильтрации.\n\nПри каждом HTTP/HTTPS запросе извлекает URL и делает lookup в RocksDB — база из 145 категорий, результат за микросекунды. Если категория запрещена для пользователя — блокировка.\n\nНаписан на C++ для inline-производительности: не замедляет проксирование.",det:["RocksDB"]},
{id:"modsec_dp",n:"ModSecurity",s:"WAF",dom:"dp_ips",sk:"both",lang:"C",fw:"ModSecurity",desc:"ModSecurity — WAF daemon.\n\nРаботает в связке с Nginx (обратный прокси). Защищает опубликованные веб-ресурсы от атак из OWASP Top 10: SQL-инъекции, XSS, CSRF, Path Traversal, RFI.\n\nOWASP Core Rule Set (CRS). Anomaly scoring: балл аномалии накапливается, блокировка при превышении порога.",det:["CRS"]},
{id:"appctrl",n:"app-control-nfq",s:"DPI",dom:"dp_dpi",sk:"both",lang:"C++",fw:"nDPI",desc:"DPI — глубокая инспекция пакетов (Контроль приложений).\n\nОпределяет приложение или протокол по содержимому пакетов через nDPI. Распознаёт 300+ приложений: мессенджеры (Telegram, WhatsApp), видео (YouTube, TikTok), торренты (BitTorrent), игры и другие.\n\nПолучает трафик через NFQUEUE. Профили контроля приложений привязываются к разрешающим правилам МСЭ — разные политики для разных сегментов сети.",det:["300+"]},
{id:"flowsrv",n:"flow-stat-server",s:"DPI-приём",dom:"dp_dpi",sk:"both",lang:"C",fw:"custom",desc:"Приёмник DPI-статистики.\n\nПринимает flow-данные от app-control-nfq: source/dest IP, порты, приложение, объём трафика (bytes in/out), длительность. Агрегирует в памяти (ring buffer) и передаёт в flow-stat-exporter.",det:["Buffer"]},
{id:"flowexp",n:"flow-stat-exporter",s:"DPI→CH",dom:"dp_dpi",sk:"both",lang:"C++",fw:"clickhouse-cpp",desc:"Экспорт DPI-статистики в ClickHouse.\n\nBatch-вставки через clickhouse-cpp для минимизации нагрузки. Буферизация: flush по размеру (1000 записей) или таймауту (5 секунд). Таблица: flow_stats.",det:["Batch"]},
{id:"trafmond",n:"trafmond",s:"Трафик",dom:"dp_dpi",sk:"both",lang:"Python",fw:"pyroute2",desc:"Мониторинг соединений в реальном времени.\n\nЧитает conntrack — таблицу всех активных NAT/stateful-соединений через NGFW. Кэширует DNS-ответы для обогащения: чтобы в интерфейсе показывать не только IP, но и имена сайтов.\n\nДанные отображаются в разделе Мониторинг веб-интерфейса.",det:["conntrack"]},
{id:"bpf",n:"bpf-acl-rules",s:"eBPF",dom:"dp_acl",sk:"classic",lang:"C",fw:"XDP, libbpf",desc:"eBPF / XDP — высокоскоростная фильтрация.\n\neBPF-программа загружается в драйвер сетевой карты и обрабатывает пакеты ДО сетевого стека Linux — фильтрация на аппаратной скорости (миллионы pps).\n\nACL-правила загружаются из acl-backend в eBPF maps (hash, LPM trie). Компилируется через LLVM, загружается через libbpf.\n\nТолько классический контекст — в VCE VPP фильтрация через VPP ACL plugin.",det:["XDP"]},
{id:"nflog",n:"ideco-nflog",s:"NFLOG→CH",dom:"dp_acl",sk:"both",lang:"C",fw:"libnetfilter_log",desc:"Захват событий межсетевого экрана.\n\nПри срабатывании правила МСЭ (accept или drop) netfilter отправляет информацию о пакете через NFLOG target. ideco-nflog перехватывает через libnetfilter_log и записывает в ClickHouse (таблица raw_traffic_journal).\n\nДанные: timestamp, src/dst IP/port, протокол, ID правила, действие. Используется для журнала МСЭ и отчётов.",det:["accept/drop"]},
{id:"strongswan_dp",n:"strongSwan",s:"IPSec",dom:"dp_acl",sk:"both",lang:"C",fw:"strongSwan",desc:"strongSwan — IPSec/IKEv2 VPN daemon (charon).\n\nУстанавливает и обслуживает шифрованные VPN-туннели: удалённый доступ пользователей (IKEv2, L2TP/IPSec) и site-to-site соединения между площадками.\n\nАутентификация VPN-клиентов через vpn-authd (xauth/eap plugin). Конфигурация туннелей из vpn-servers-backend и ipsec-backend через etcd.",det:["charon"]},
{id:"frr_dp",n:"FRRouting",s:"zebra/bgpd",dom:"dp_acl",sk:"both",lang:"C",fw:"FRRouting",desc:"FRRouting — daemon'ы маршрутизации.\n\nzebra: ядро — управляет таблицей маршрутизации Linux. bgpd: обмен маршрутами с провайдерами и другими площадками по BGP. ospfd: динамическая маршрутизация внутри сети по OSPF.\n\nКонфигурация из routing-backend через etcd.",det:["zebra"]},
{id:"keepalived_dp",n:"keepalived",s:"VRRP",dom:"dp_acl",sk:"both",lang:"C",fw:"keepalived",desc:"keepalived — VRRP daemon для HA-кластера.\n\nОбеспечивает отказоустойчивость Active-Passive. Master отправляет heartbeat (multicast), при пропуске — Standby забирает виртуальные IP и становится активным.\n\nВремя переключения — несколько секунд. Конфигурация из cluster-backend через etcd.",det:["VRRP"]},
{id:"system",n:"system-backend",s:"Ядро",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp, psutil",desc:"Ядро системы — базовые настройки сервера.\n\nЧасовой пояс, язык интерфейса. Администраторы: создание локальных, интеграция из AD/ALD Pro/RADIUS. Роли: суперадминистратор, администратор МСЭ, администратор ИБ, аудитор.\n\nТерминал: диагностика прямо из браузера (shell). Мониторинг здоровья: CPU, RAM, диски — при превышении пороговых значений уведомление и запись в логи.\n\nGeoIP: геолокация IP-адресов для аудита и правил. system-lib импортируют 20+ бэкендов.",det:["system-lib: 20+"]},
{id:"license",n:"license-backend",s:"Лицензии",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"Лицензирование NGFW.\n\nПривязка лицензии к серверу (онлайн или офлайн). Лицензия определяет: максимальное количество одновременно авторизованных пользователей, доступность модулей (IPS по подписке ET Pro, антивирус Kaspersky, обновления контент-фильтра).\n\nЛицензия общая между системным контекстом и всеми VCE. Без подписки: IPS работает с бесплатными ET Open, антивирус — только ClamAV.",det:["Подписки"]},
{id:"backup",n:"backup-backend",s:"Бэкапы",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"Резервное копирование конфигурации.\n\nБэкап: сохранение всех настроек (etcd dump + конфигурационные файлы) в архив tar.gz. По расписанию (cron) или вручную.\n\nВосстановление: полный restore конфигурации из бэкапа. Откат: при обновлении автоматически создаётся бэкап для возврата к предыдущей версии.\n\nВажно: бэкап системного контекста не включает данные дочерних VCE — для каждого VCE нужен отдельный бэкап.",det:["etcd dump"]},
{id:"sysupd",n:"sysupdate-backend",s:"Обновления",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"Обновления NGFW.\n\nТипы: ОС (RPM-пакеты), ядро Linux (патчи безопасности), базы IPS (ET Open/Pro), базы антивируса (ClamAV/Kaspersky), базы контент-фильтра (URL-категории), GeoIP.\n\nАвтоматическое обновление по расписанию. Обновления скачиваются с серверов Ideco. Перед обновлением автоматически создаётся бэкап.",det:["RPM"]},
{id:"cert",n:"cert-backend",s:"PKI",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp, pyOpenSSL",desc:"PKI — центр сертификации NGFW.\n\nПри первом запуске автоматически генерирует корневой самоподписанный сертификат. Для каждого модуля (обратный прокси, VPN IKEv2/SSTP, веб-интерфейс, веб-аутентификация, почта) автоматически создаётся цепочка сертификатов.\n\nПараллельно пытается получить сертификат Let's Encrypt (ACME, HTTP-01 challenge) — при успехе заменяет самоподписанный. Сертификаты Let's Encrypt выпускаются на 3 месяца и перевыпускаются автоматически.\n\nМожно загрузить собственные сертификаты (корневые или на конкретный домен). CRL/OCSP для отзыва.",det:["CA"]},
{id:"vce",n:"vce-backend",s:"VCE",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"VCE — виртуальные контексты NGFW.\n\nСоздание виртуальных серверов (контекстов) на одном физическом NGFW. Реализовано на базе контейнеров Linux (systemd-nspawn). Позволяет разделить одну сеть на несколько независимых — каждая со своими правилами, пользователями, политиками безопасности.\n\nДва типа: Классический (VCE NGFW, мин. 8 ГБ RAM + 2 ядра) и Высокопроизводительный (VCE VPP, мин. 8 ГБ RAM + 4 ядра, обработка через VPP).\n\nКонтексты изолированы по CPU и памяти. Интерфейсы и зоны настраиваются из системного контекста. Это не Multitenancy.\n\nvce-lib импортируют 35+ бэкендов.",det:["vce-lib: 35+"]},
{id:"cc",n:"central-console",s:"Ideco Center",dom:"sys_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"Ideco Center — централизованное управление парком NGFW.\n\nУправление несколькими устройствами NGFW из одного интерфейса. Шаблоны политик: создание набора правил и применение на все или выбранные устройства.\n\nМониторинг состояния всех NGFW в реальном времени. Актуально для организаций и провайдеров с несколькими NGFW.",det:["Парк"]},
{id:"cluster",n:"cluster-backend",s:"Кластер",dom:"ha_i",sk:"both",lang:"Python",fw:"aiohttp",desc:"Кластеризация — отказоустойчивый кластер из двух серверов NGFW.\n\nРежим Active-Passive: Master обрабатывает весь трафик, Standby — в горячем резерве. При отказе Master (heartbeat VRRP через keepalived) Standby автоматически забирает виртуальные IP.\n\nКонфигурация синхронизируется между нодами через etcd. Ручное переключение для планового обслуживания.\n\nВажно: кластеризация недоступна внутри VCE — только на уровне системного контекста.",det:["VRRP"]},
];

var DBS=[{id:"db_perm",n:"etcd PERM",sub:"Конфиг",color:CE},{id:"db_run",n:"etcd RUN",sub:"Оперативные",color:CE2},{id:"db_ch",n:"ClickHouse",sub:"Логи",color:CC},{id:"db_sq_ad",n:"SQLite:AD",sub:"Кэш",color:CS},{id:"db_sq_usr",n:"SQLite:Usr",sub:"Учётки",color:CS2},{id:"db_sq_ips",n:"SQLite:IPS",sub:"Rules",color:CS3},{id:"db_rk",n:"RocksDB",sub:"URL",color:CR}];
var DB_COMP_MAP={"db_perm":DB_PERM,"db_run":DB_RUN,"db_ch":DB_CH,"db_sq_ad":DB_SQ_AD,"db_sq_usr":DB_SQ_USR,"db_sq_ips":DB_SQ_IPS,"db_rk":DB_RK};

var DEFAULT_TEAMS=[
  {id:"t_net",name:"Network & Routing",members:["l2","dns_be","dhcp_be","routing","igmp","netscan","unbound_dp","dhcpd_dp","frr_dp","keepalived_dp"]},
  {id:"t_fw",name:"Firewall & Traffic",members:["fw","alias","acl","cfw","shaper","vpp_be","vpp_dp","bpf","nflog"]},
  {id:"t_sec",name:"Security & CF",members:["cf","suricata_be","av","waf_be","proxy_be","reverse","suricata_dp","squid_dp","ecap_av","ecap_urls","modsec_dp","appctrl"]},
  {id:"t_auth",name:"Auth & Users",members:["auth","ad","ald","user","webauthd","vpnauthd"]},

  {id:"t_plat",name:"Platform & Infra",members:["system","license","backup","sysupd","cert","vce","cc","cluster"]},

var CW=148,CG=5,RH=36,RG=3,DT=16,LT=30,LP=12,IW=190;
function buildLayout(){var pos={},y=8,mW=0;LAYERS.forEach(function(lay){var ds=Object.keys(DOMS).filter(function(k){return DOMS[k].ly===lay.id;});var tw=LP;ds.forEach(function(){tw+=CW+CG+10;});if(tw>mW)mW=tw;});LAYERS.forEach(function(lay){var ds=Object.keys(DOMS).filter(function(k){return DOMS[k].ly===lay.id;});var maxR=0;ds.forEach(function(dk){var cnt=C.filter(function(c){return c.dom===dk;}).length;if(cnt>maxR)maxR=cnt;});var lH=LT+maxR*(RH+RG)+DT+12;pos["L_"+lay.id]={x:LP,y:y,w:mW,h:lH};var dx=LP+6;ds.forEach(function(dk){var comps=C.filter(function(c){return c.dom===dk;});var dW=CW+8;pos["D_"+dk]={x:dx,y:y+LT,w:dW,h:lH-LT-6};comps.forEach(function(c,ci){pos[c.id]={x:dx+4,y:y+LT+DT+ci*(RH+RG),w:CW,h:RH};});dx+=dW+CG;});y+=lH+6;});var iH=y-8-6,iX=mW+LP+10;pos.INFRA={x:iX,y:8,w:IW,h:iH};var infraDs=Object.keys(DOMS).filter(function(k){return DOMS[k].ly==="infra";});var iy=40;infraDs.forEach(function(dk){var comps=C.filter(function(c){return c.dom===dk;});var dH=comps.length*(RH+RG)+DT+8;pos["D_"+dk]={x:iX+6,y:8+iy,w:IW-12,h:dH};comps.forEach(function(c,ci){pos[c.id]={x:iX+10,y:8+iy+DT+ci*(RH+RG),w:IW-20,h:RH};});iy+=dH+6;});pos["D_db_i"]={x:iX+6,y:8+iy,w:IW-12,h:DBS.length*32+DT+8};DBS.forEach(function(db,di){pos[db.id]={x:iX+10,y:8+iy+DT+di*32,w:IW-20,h:26};});return pos;}
var POS=buildLayout();
function getConn(id){var libs=LIBS[id];if(!libs)return new Set();var s=new Set();libs.forEach(function(lib){var m=LIB2ID[lib];if(m&&m!==id)s.add(m);});Object.keys(LIBS).forEach(function(oid){if(oid===id)return;(LIBS[oid]||[]).forEach(function(lib){var m=LIB2ID[lib];if(m===id)s.add(oid);});});return s;}
function getLibsBtw(a,b){var r=[];(LIBS[a]||[]).forEach(function(l){if(LIB2ID[l]===b)r.push(l);});(LIBS[b]||[]).forEach(function(l){if(LIB2ID[l]===a&&r.indexOf(l)<0)r.push(l);});return r;}
function getDbC(did){return DB_COMP_MAP[did]||[];}

function App(){
  var svgRef=useRef(null);
  var[theme,setTheme]=useState("light");var T=THEMES[theme];
  var[sel,setSel]=useState(null);var[pan,setPan]=useState({x:0,y:0});var[zoom,setZoom]=useState(0.52);var[panning,setPanning]=useState(false);var ps=useRef(null);var dd=useRef(false);
  var[search,setSearch]=useState("");var[sL,setSL]=useState(null);var[sD,setSD]=useState(null);var[sDb,setSDb]=useState(null);var[hDb,setHDb]=useState(null);var[tt,setTT]=useState(null);
  var[scenario,setScenario]=useState(null);var[scStep,setScStep]=useState(0);
  var[teams,setTeams]=useState(DEFAULT_TEAMS);var[showTeams,setShowTeams]=useState(false);
  var[dragComp,setDragComp]=useState(null);var[dragOver,setDragOver]=useState(null);
  var[teamHL,setTeamHL]=useState(null);
  /* Undo stack */
  var[undoStack,setUndoStack]=useState([]);

  var ac=sel;var adb=sDb||hDb;
  var conn=useMemo(function(){return ac?getConn(ac):new Set();},[ac]);
  var selC=C.find(function(c){return c.id===sel;});
  var sIds=useMemo(function(){if(!search.trim())return null;var q=search.toLowerCase();return new Set(C.filter(function(c){return c.n.toLowerCase().indexOf(q)>=0||c.s.toLowerCase().indexOf(q)>=0;}).map(function(c){return c.id;}));},[search]);
  var dbBk=useMemo(function(){return adb?new Set(getDbC(adb)):new Set();},[adb]);
  /* FIX #5: only highlight DBs that selected component actually connects to */
  var selCompDbs=useMemo(function(){if(!ac)return new Set();var s=new Set();DBS.forEach(function(db){if(getDbC(db.id).indexOf(ac)>=0)s.add(db.id);});return s;},[ac]);
  var activeDbColor=useMemo(function(){if(!adb)return null;var db=DBS.find(function(d){return d.id===adb;});return db?db.color:null;},[adb]);
  var scHighlight=useMemo(function(){if(!scenario)return new Set();var sc=SCENARIOS.find(function(s2){return s2.id===scenario;});if(!sc)return new Set();return new Set(sc.steps.slice(0,scStep+1).map(function(s2){return s2.comp;}));},[scenario,scStep]);
  var scCurrent=useMemo(function(){if(!scenario)return null;var sc=SCENARIOS.find(function(s2){return s2.id===scenario;});return sc?sc.steps[scStep]:null;},[scenario,scStep]);
  var scLines=useMemo(function(){if(!scenario)return[];var sc=SCENARIOS.find(function(s2){return s2.id===scenario;});if(!sc)return[];var lines=[];for(var i=0;i<Math.min(scStep,sc.steps.length-1);i++){var f=POS[sc.steps[i].comp],t=POS[sc.steps[i+1].comp];if(f&&t)lines.push({x1:f.x+f.w/2,y1:f.y+f.h/2,x2:t.x+t.w/2,y2:t.y+t.h/2});}return lines;},[scenario,scStep]);
  var compTeamMap=useMemo(function(){var m={};teams.forEach(function(t){t.members.forEach(function(cid){m[cid]=t.id;});});return m;},[teams]);
  var teamHLSet=useMemo(function(){if(!teamHL)return new Set();var t=teams.find(function(x){return x.id===teamHL;});return t?new Set(t.members):new Set();},[teamHL,teams]);

  var dbLines=useMemo(function(){
    if(ac){var fp=POS[ac];if(!fp)return[];var r=[];DBS.forEach(function(db){if(getDbC(db.id).indexOf(ac)>=0){var p=POS[db.id];if(p)r.push({x1:fp.x+fp.w,y1:fp.y+fp.h/2,x2:p.x,y2:p.y+p.h/2,color:db.color,did:db.id});}});return r;}

        </div>}

        <div style={{position:"absolute",bottom:8,left:8,display:"flex",gap:3,zIndex:20}}>
          <button onClick={function(){setZoom(Math.min(2.5,zoom*1.2));}} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>+</button>
          <button onClick={function(){setZoom(Math.max(.12,zoom/1.2));}} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>−</button>
          <button onClick={function(){setZoom(.42);setPan({x:0,y:0});}} style={{width:28,height:28,borderRadius:5,border:"1px solid "+T.BD,background:T.CD,color:T.TX,cursor:"pointer",fontSize:14,fontWeight:700}}>⟲</button>
        </div>
      </div>

      {showSB&&<div style={{width:380,minWidth:380,background:T.CD,borderLeft:"1px solid "+T.BD,overflowY:"auto",display:"flex",flexDirection:"column",transition:"background .3s"}}>
        <div style={{display:"flex",justifyContent:"flex-end",padding:"6px 10px 0"}}><button onClick={function(){setSel(null);setSL(null);setSD(null);setSDb(null);}} style={{background:"none",border:"none",color:T.TD,cursor:"pointer",fontSize:16}}>✕</button></div>
        <div style={{flex:1,overflowY:"auto"}}>{side}</div>
      </div>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
