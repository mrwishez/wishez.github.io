*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0d20;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;color:#E1EAF9}
#root{width:100vw;height:100vh;display:flex}
.main{flex:1;position:relative;overflow:hidden}
.sidebar{width:380px;min-width:380px;background:#161530;border-left:1px solid #2d2856;overflow-y:auto;display:flex;flex-direction:column}
.teams-panel{width:280px;min-width:280px;background:#161530;border-right:1px solid #2d2856;overflow-y:auto;display:flex;flex-direction:column}
.team-group{margin:6px 8px;border-radius:8px;border:2px solid transparent;padding:6px;min-height:40px;transition:border-color .2s}
.team-group.drag-over{border-color:#FF5A1A}
.team-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer}
.team-dot{width:10px;height:10px;border-radius:5px;flex-shrink:0}
.team-name{font-size:12px;font-weight:700}
.team-count{font-size:9px;color:#6a6890;margin-left:auto}
.team-comp{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;margin:2px;border-radius:4px;font-size:9px;cursor:grab;user-select:none;transition:all .15s;font-family:monospace}
.team-comp:active{cursor:grabbing;opacity:.7}
.team-comp.dragging{opacity:.3}
.top-bar{position:absolute;top:8px;left:8px;z-index:20;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.top-bar input,.top-bar select,.top-bar button{padding:5px 8px;border-radius:6px;border:1px solid #2d2856;background:#161530;color:#E1EAF9;font-size:10px;outline:none}
.top-bar button{cursor:pointer}
.zoom-bar{position:absolute;bottom:8px;left:8px;z-index:20;display:flex;gap:3px}
.zoom-bar button{width:28px;height:28px;border-radius:5px;border:1px solid #2d2856;background:#161530;color:#E1EAF9;cursor:pointer;font-size:14px;font-weight:700}
.sc-panel{position:absolute;bottom:42px;left:8px;right:8px;z-index:20;background:#161530f5;border:1px solid #4ecdc444;border-radius:8px;padding:10px 14px}
.tt{position:absolute;background:#161530f8;border:1px solid #2d2856;border-radius:8px;padding:6px 10px;max-width:250px;z-index:30;pointer-events:none;font-size:11px;line-height:1.5;white-space:pre-line;box-shadow:0 3px 10px rgba(0,0,0,.5)}
</style>

const DB_COMP_MAP={"db_perm":DB_PERM,"db_run":DB_RUN,"db_ch":DB_CH,"db_sq_ad":DB_SQ_AD,"db_sq_usr":DB_SQ_USR,"db_sq_ips":DB_SQ_IPS,"db_rk":DB_RK};

/* Default teams */
const DEFAULT_TEAMS=[
  {id:"t_net",name:"Network & Routing",color:"#4a9ec8",members:["l2","dns_be","dhcp_be","routing","igmp","netscan","unbound_dp","dhcpd_dp","frr_dp","keepalived_dp"]},
  {id:"t_fw",name:"Firewall & Traffic",color:"#FF5A1A",members:["fw","alias","acl","cfw","shaper","vpp_be","vpp_dp","bpf","nflog"]},
  {id:"t_sec",name:"Security & CF",color:"#E77C06",members:["cf","suricata_be","av","waf_be","proxy_be","reverse","suricata_dp","squid_dp","ecap_av","ecap_urls","modsec_dp","appctrl"]},
  {id:"t_auth",name:"Auth & Users",color:"#b490d0",members:["auth","ad","ald","user","webauthd","vpnauthd"]},
  {id:"t_vpn",name:"VPN & Remote",color:"#4ecdc4",members:["vpnsrv","ipsec","gostvpn","agent","wg","strongswan_dp"]},

];

const CW=148,CG=5,RH=36,RG=3,DT=16,LT=30,LP=12,IW=190;
function buildLayout(){const pos={};let y=8,mW=0;LAYERS.forEach(lay=>{const ds=Object.keys(DOMS).filter(k=>DOMS[k].ly===lay.id);let tw=LP;ds.forEach(()=>{tw+=CW+CG+10});if(tw>mW)mW=tw;});LAYERS.forEach(lay=>{const ds=Object.keys(DOMS).filter(k=>DOMS[k].ly===lay.id);let maxR=0;ds.forEach(dk=>{const cnt=C.filter(c=>c.dom===dk).length;if(cnt>maxR)maxR=cnt;});const lH=LT+maxR*(RH+RG)+DT+12;pos["L_"+lay.id]={x:LP,y,w:mW,h:lH};let dx=LP+6;ds.forEach(dk=>{const comps=C.filter(c=>c.dom===dk);const dW=CW+8;pos["D_"+dk]={x:dx,y:y+LT,w:dW,h:lH-LT-6};comps.forEach((c,ci)=>{pos[c.id]={x:dx+4,y:y+LT+DT+ci*(RH+RG),w:CW,h:RH};});dx+=dW+CG;});y+=lH+6;});const iH=y-8-6,iX=mW+LP+10;pos.INFRA={x:iX,y:8,w:IW,h:iH};const infraDs=Object.keys(DOMS).filter(k=>DOMS[k].ly==="infra");let iy=40;infraDs.forEach(dk=>{const comps=C.filter(c=>c.dom===dk);const dH=comps.length*(RH+RG)+DT+8;pos["D_"+dk]={x:iX+6,y:8+iy,w:IW-12,h:dH};comps.forEach((c,ci)=>{pos[c.id]={x:iX+10,y:8+iy+DT+ci*(RH+RG),w:IW-20,h:RH};});iy+=dH+6;});pos["D_db_i"]={x:iX+6,y:8+iy,w:IW-12,h:DBS.length*32+DT+8};DBS.forEach((db,di)=>{pos[db.id]={x:iX+10,y:8+iy+DT+di*32,w:IW-20,h:26};});return pos;}
const POS=buildLayout();
function getConn(id){const libs=LIBS[id];if(!libs)return new Set();const s=new Set();libs.forEach(lib=>{const m=LIB2ID[lib];if(m&&m!==id)s.add(m);});Object.keys(LIBS).forEach(oid=>{if(oid===id)return;(LIBS[oid]||[]).forEach(lib=>{const m=LIB2ID[lib];if(m===id)s.add(oid);});});return s;}
function getLibsBtw(a,b){const r=[];(LIBS[a]||[]).forEach(l=>{if(LIB2ID[l]===b)r.push(l)});(LIBS[b]||[]).forEach(l=>{if(LIB2ID[l]===a&&!r.includes(l))r.push(l)});return r;}
function getDbC(did){return DB_COMP_MAP[did]||[];}

function App(){
  const svgRef=useRef(null);
  const[sel,setSel]=useState(null);const[pan,setPan]=useState({x:0,y:0});const[zoom,setZoom]=useState(0.42);const[panning,setPanning]=useState(false);const ps=useRef(null);const dd=useRef(false);
  const[search,setSearch]=useState("");const[sL,setSL]=useState(null);const[sD,setSD]=useState(null);const[sDb,setSDb]=useState(null);const[hDb,setHDb]=useState(null);const[tt,setTT]=useState(null);
  const[scenario,setScenario]=useState(null);const[scStep,setScStep]=useState(0);
  const[teams,setTeams]=useState(DEFAULT_TEAMS);const[showTeams,setShowTeams]=useState(true);const[dragComp,setDragComp]=useState(null);const[teamHL,setTeamHL]=useState(null);

  const ac=sel;const adb=sDb||hDb;
  const conn=useMemo(()=>ac?getConn(ac):new Set(),[ac]);
  const selC=C.find(c=>c.id===sel);
  const sIds=useMemo(()=>{if(!search.trim())return null;const q=search.toLowerCase();return new Set(C.filter(c=>c.n.toLowerCase().includes(q)||c.s.toLowerCase().includes(q)).map(c=>c.id));},[search]);
  const dbBk=useMemo(()=>adb?new Set(getDbC(adb)):new Set(),[adb]);
  const selCompDbs=useMemo(()=>{if(!ac)return new Set();const s=new Set();DBS.forEach(db=>{if(getDbC(db.id).includes(ac))s.add(db.id)});return s;},[ac]);
  const activeDbColor=useMemo(()=>{if(!adb)return null;const db=DBS.find(d=>d.id===adb);return db?db.color:null;},[adb]);
  const scHighlight=useMemo(()=>{if(!scenario)return new Set();const sc=SCENARIOS.find(s=>s.id===scenario);if(!sc)return new Set();return new Set(sc.steps.slice(0,scStep+1).map(s=>s.comp));},[scenario,scStep]);
  const scCurrent=useMemo(()=>{if(!scenario)return null;const sc=SCENARIOS.find(s=>s.id===scenario);return sc?sc.steps[scStep]:null;},[scenario,scStep]);
  const scLines=useMemo(()=>{if(!scenario)return[];const sc=SCENARIOS.find(s=>s.id===scenario);if(!sc)return[];const lines=[];for(let i=0;i<Math.min(scStep,sc.steps.length-1);i++){const f=POS[sc.steps[i].comp],t=POS[sc.steps[i+1].comp];if(f&&t)lines.push({x1:f.x+f.w/2,y1:f.y+f.h/2,x2:t.x+t.w/2,y2:t.y+t.h/2});}return lines;},[scenario,scStep]);

  /* Team color for component */
  const compTeamColor=useMemo(()=>{const m={};teams.forEach(t=>{t.members.forEach(cid=>{m[cid]=t.color;});});return m;},[teams]);
  /* teamHL set */
  const teamHLSet=useMemo(()=>{if(!teamHL)return new Set();const t=teams.find(x=>x.id===teamHL);return t?new Set(t.members):new Set();},[teamHL,teams]);

  const dbLines=useMemo(()=>{if(ac){const fp=POS[ac];if(!fp)return[];const r=[];DBS.forEach(db=>{if(getDbC(db.id).includes(ac)){const p=POS[db.id];if(p)r.push({x1:fp.x+fp.w,y1:fp.y+fp.h/2,x2:p.x,y2:p.y+p.h/2,color:db.color,did:db.id})}});return r;}if(adb){const dp=POS[adb];if(!dp)return[];const db2=DBS.find(d=>d.id===adb);if(!db2)return[];return getDbC(adb).map(cid=>{const cp=POS[cid];if(!cp)return null;return{x1:cp.x+cp.w,y1:cp.y+cp.h/2,x2:dp.x,y2:dp.y+dp.h/2,color:db2.color,did:adb}}).filter(Boolean);}return[];},[ac,adb]);
  const svcL=useMemo(()=>{if(!ac)return[];const fp=POS[ac];if(!fp)return[];return Array.from(conn).map(cid=>{const tp=POS[cid];if(!tp)return null;const libs=getLibsBtw(ac,cid);const desc=libs.map(l=>LINK_DESC[l]||l).join("\n");return{x1:fp.x+fp.w/2,y1:fp.y+fp.h/2,x2:tp.x+tp.w/2,y2:tp.y+tp.h/2,color:O+"77",desc}}).filter(Boolean);},[ac,conn]);

  const onW=useCallback(e=>{e.preventDefault();const r=svgRef.current.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const f=e.deltaY>0?.93:1.07;const nz=Math.max(.12,Math.min(2.5,zoom*f));setPan(p=>({x:mx-(mx-p.x)*(nz/zoom),y:my-(my-p.y)*(nz/zoom)}));setZoom(nz);},[zoom]);
  useEffect(()=>{const el=svgRef.current;if(el)el.addEventListener("wheel",onW,{passive:false});return()=>{if(el)el.removeEventListener("wheel",onW)};},[onW]);
  const onMD=useCallback(e=>{setPanning(true);ps.current={x:e.clientX-pan.x,y:e.clientY-pan.y};dd.current=false;},[pan]);
  const onMM=useCallback(e=>{if(panning&&ps.current){if(Math.abs(e.clientX-ps.current.x-pan.x)>3||Math.abs(e.clientY-ps.current.y-pan.y)>3)dd.current=true;setPan({x:e.clientX-ps.current.x,y:e.clientY-ps.current.y});}},[panning,pan]);
  const onMU=useCallback(()=>{setPanning(false);ps.current=null;},[]);
  function clr(){if(!dd.current){setSel(null);setSL(null);setSD(null);setSDb(null);setTeamHL(null);}}
  function si(fn,e){e.stopPropagation();if(!dd.current)fn();}
  function showTTip(e,t){if(!t)return;const r=svgRef.current.getBoundingClientRect();setTT({x:e.clientX-r.left+14,y:e.clientY-r.top-10,text:t});}

  /* Drag & drop for teams */
  function onDragStart(compId,e){setDragComp(compId);e.dataTransfer.effectAllowed="move";}
  function onDragOver(teamId,e){e.preventDefault();e.dataTransfer.dropEffect="move";}
  function onDrop(teamId,e){e.preventDefault();if(!dragComp)return;setTeams(prev=>{const next=prev.map(t=>({...t,members:t.members.filter(m=>m!==dragComp)}));const idx=next.findIndex(t=>t.id===teamId);if(idx>=0)next[idx]={...next[idx],members:[...next[idx].members,dragComp]};return next;});setDragComp(null);}

  const activeSc=scenario?SCENARIOS.find(s=>s.id===scenario):null;
  let side=null;
  if(selC){
    const cdbs=DBS.filter(db=>getDbC(db.id).includes(selC.id));
    const lcs=[];conn.forEach(cid=>{const c2=C.find(x=>x.id===cid);if(!c2)return;getLibsBtw(selC.id,cid).forEach(l=>{lcs.push({cid,nm:c2.n,lib:l,desc:LINK_DESC[l]||l})})});
    const tc=compTeamColor[selC.id];
    side=(<div style={{padding:14}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}><span style={{background:O,color:"#fff",fontSize:8,padding:"2px 6px",borderRadius:3,fontWeight:700}}>{DOMS[selC.dom]?.l}</span><span style={{background:(SC[selC.sk])+"33",color:SC[selC.sk],fontSize:8,padding:"2px 6px",borderRadius:3,fontWeight:700}}>{SL[selC.sk]}</span>{tc&&<span style={{background:tc+"33",color:tc,fontSize:8,padding:"2px 6px",borderRadius:3,fontWeight:700}}>{teams.find(t=>t.members.includes(selC.id))?.name}</span>}</div>
      <h2 style={{margin:"0 0 2px",fontSize:17,color:TX,fontFamily:"monospace"}}>{selC.n}</h2>
      <div style={{fontSize:11,color:Ob,marginBottom:6}}>{selC.s}</div>
      <div style={{background:BG,borderRadius:5,padding:8,marginBottom:10,border:"1px solid "+BD,fontSize:10}}><span style={{color:TD}}>Язык:</span> <span style={{color:TX}}>{selC.lang}</span> · <span style={{color:TD}}>Lib:</span> <span style={{color:TX}}>{selC.fw}</span></div>
      {selC.det&&<div style={{marginBottom:10}}>{selC.det.map((d,i)=><div key={i} style={{fontSize:11,color:TX,padding:"1px 0"}}>· {d}</div>)}</div>}
      {cdbs.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:9,color:TD,fontWeight:700,marginBottom:3}}>ХРАНИЛИЩА</div>{cdbs.map(db=><span key={db.id} onClick={()=>{setSDb(db.id);setSel(null)}} style={{display:"inline-block",fontSize:9,color:db.color,background:db.color+"15",border:"1px solid "+db.color+"33",padding:"2px 5px",borderRadius:3,cursor:"pointer",margin:"0 2px 2px 0"}}>{db.n}</span>)}</div>}
      {lcs.length>0&&<div><div style={{fontSize:9,color:TD,fontWeight:700,marginBottom:3}}>СВЯЗИ ({lcs.length})</div>{lcs.slice(0,12).map((lc,i)=><div key={i} onClick={()=>setSel(lc.cid)} style={{fontSize:10,cursor:"pointer",padding:"1px 0"}}><span style={{color:O,fontFamily:"monospace"}}>{lc.nm}</span> <span style={{color:TD,fontSize:8}}>({lc.lib})</span></div>)}{lcs.length>12&&<div style={{fontSize:9,color:TD}}>...+{lcs.length-12}</div>}</div>}
    </div>);
  } else if(sDb){
    const db=DBS.find(d=>d.id===sDb);const dbc=db?getDbC(db.id):[];
    side=db?<div style={{padding:14}}><h2 style={{fontSize:16,color:db.color}}>{db.n}</h2><div style={{fontSize:10,color:Ob,marginBottom:6}}>{db.sub}</div><div style={{fontSize:11,color:TX,marginBottom:8}}>{DB_LINK_DESC[db.id]}</div>{dbc.length>0&&<div><div style={{fontSize:9,color:TD,fontWeight:700,marginBottom:3}}>БЭКЕНДЫ ({dbc.length})</div><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{dbc.map(cid=>{const c2=C.find(x=>x.id===cid);return c2?<span key={cid} onClick={()=>{setSel(cid);setSDb(null)}} style={{fontSize:9,color:O,background:O+"15",border:"1px solid "+O+"33",padding:"2px 5px",borderRadius:3,cursor:"pointer"}}>{c2.n}</span>:null})}</div></div>}</div>:null;
  } else if(sL){side=<div style={{padding:14}}><h2 style={{fontSize:16,color:O}}>{sL==="infra"?"INFRASTRUCTURE":LAYERS.find(l=>l.id===sL)?.label||""}</h2><p style={{fontSize:12,color:TX,marginTop:6,whiteSpace:"pre-line"}}>{LAYER_DESC[sL]}</p></div>;
  } else if(sD){side=<div style={{padding:14}}><h2 style={{fontSize:16,color:O}}>{DOMS[sD]?.l}</h2><div style={{marginTop:6}}>{C.filter(c=>c.dom===sD).map(c=><div key={c.id} onClick={()=>{setSel(c.id);setSD(null)}} style={{padding:"3px 6px",borderRadius:4,cursor:"pointer",background:BG,marginBottom:2,border:"1px solid "+BD,fontSize:10}}><span style={{color:TX,fontFamily:"monospace"}}>{c.n}</span> <span style={{color:SC[c.sk],fontSize:8}}>{SL[c.sk]}</span></div>)}</div></div>;}
  const showSB=side!==null;

  return(
    <div id="root" style={{display:"flex"}}>
      {/* Teams panel */}
      {showTeams&&<div className="teams-panel">
        <div style={{padding:"10px 10px 4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:700,color:O}}>👥 Команды</span>
          <button onClick={()=>setShowTeams(false)} style={{background:"none",border:"none",color:TD,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{padding:"0 8px 4px",fontSize:9,color:TD}}>Перетаскивайте бэкенды между командами</div>
        {teams.map(team=>(
          <div key={team.id} className={"team-group"+(dragComp?" drag-target":"")} onDragOver={e=>onDragOver(team.id,e)} onDrop={e=>onDrop(team.id,e)} style={{background:team.color+"08",border:"2px solid "+(teamHL===team.id?team.color:team.color+"22")}}>
            <div className="team-header" onClick={()=>setTeamHL(teamHL===team.id?null:team.id)}>
              <div className="team-dot" style={{background:team.color}}/>
              <span className="team-name" style={{color:team.color}}>{team.name}</span>
              <span className="team-count">{team.members.length}</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap"}}>
              {team.members.map(cid=>{const comp=C.find(x=>x.id===cid);if(!comp)return null;return <span key={cid} className={"team-comp"+(dragComp===cid?" dragging":"")} draggable onDragStart={e=>onDragStart(cid,e)} onClick={e=>{e.stopPropagation();setSel(cid);setSL(null);setSD(null);setSDb(null);setTeamHL(null);setScenario(null);}} style={{background:team.color+"15",color:team.color,border:"1px solid "+team.color+"33"}}>{comp.n}</span>;})}
            </div>
          </div>
        ))}
        <div style={{padding:"8px",fontSize:9,color:TD,borderTop:"1px solid "+BD,marginTop:4}}>
          💡 Клик на название команды — подсветка на схеме
        </div>
      </div>}

      <div className="main">
        <svg ref={svgRef} width="100%" height="100%" style={{cursor:panning?"grabbing":"grab"}} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={()=>{onMU();setTT(null)}} onClick={clr}>
          <defs><filter id="gl"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
            {svcL.map((l,i)=><line key={"s"+i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={2} opacity={.6} strokeDasharray="5,3" onMouseEnter={e=>showTTip(e,l.desc)} onMouseLeave={()=>setTT(null)} style={{cursor:"help",pointerEvents:"stroke"}}/>)}
            {dbLines.map((l,i)=><line key={"d"+i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={2.5} opacity={.5} strokeDasharray="6,4" filter="url(#gl)" onMouseEnter={e=>showTTip(e,DB_LINK_DESC[l.did]||"")} onMouseLeave={()=>setTT(null)} style={{cursor:"help",pointerEvents:"stroke"}}/>)}
            {scLines.map((l,i)=><line key={"sc"+i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#4ecdc4" strokeWidth={3} opacity={.8} strokeDasharray="8,4"/>)}

            {LAYERS.map(lay=>{const p=POS["L_"+lay.id];if(!p)return null;return <g key={lay.id} onClick={e=>si(()=>{setSL(lay.id);setSel(null);setSD(null);setSDb(null)},e)} style={{cursor:"pointer"}}><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={10} fill={lay.color+"08"} stroke={lay.color+"33"} strokeWidth={1.5} strokeDasharray="10,5"/><text x={p.x+10} y={p.y+16} fontSize={12} fontWeight={800} fill={lay.color} letterSpacing="1.5">{lay.label}</text><text x={p.x+10} y={p.y+28} fontSize={8} fill={TD}>{lay.desc}</text></g>})}
            {POS.INFRA&&<g onClick={e=>si(()=>{setSL("infra");setSel(null);setSD(null);setSDb(null)},e)} style={{cursor:"pointer"}}><rect x={POS.INFRA.x} y={POS.INFRA.y} width={POS.INFRA.w} height={POS.INFRA.h} rx={10} fill={O3+"08"} stroke={O3+"33"} strokeWidth={1.5} strokeDasharray="10,5"/><text x={POS.INFRA.x+8} y={POS.INFRA.y+18} fontSize={12} fontWeight={800} fill={O3} letterSpacing="1.5">INFRASTRUCTURE</text></g>}

            {Object.keys(DOMS).map(dk=>{const dv=DOMS[dk],p=POS["D_"+dk];if(!p)return null;return <g key={dk} onClick={e=>si(()=>{setSD(dk);setSel(null);setSL(null);setSDb(null)},e)} style={{cursor:"pointer"}}><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={6} fill={CD} stroke={dv.c+"30"}/><text x={p.x+5} y={p.y+12} fontSize={8} fontWeight={700} fill={dv.c}>{dv.l}</text></g>})}

            {DBS.map(db=>{const p=POS[db.id];if(!p)return null;const isConn=ac&&selCompDbs.has(db.id);const isActive=adb===db.id;const lit=isConn||isActive;return <g key={db.id} onMouseEnter={()=>setHDb(db.id)} onMouseLeave={()=>setHDb(null)} onClick={e=>si(()=>{setSDb(sDb===db.id?null:db.id);setSel(null);setSL(null);setSD(null)},e)} style={{cursor:"pointer"}}><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={5} fill={lit?db.color+"22":CD} stroke={lit?db.color:db.color+"44"} strokeWidth={lit?2.5:1}/><text x={p.x+6} y={p.y+11} fontSize={8} fontWeight={700} fill={db.color}>{db.n}</text><text x={p.x+6} y={p.y+21} fontSize={6} fill={TD}>{db.sub}</text></g>})}

            {C.map(c=>{const p=POS[c.id];if(!p)return null;const isS=sel===c.id,isC=conn.has(c.id),isDbC=dbBk.has(c.id),isSc=scHighlight.has(c.id),isScCur=scCurrent?.comp===c.id,isTHL=teamHLSet.has(c.id);
              const hc=isDbC&&activeDbColor?activeDbColor:null;const tc=compTeamColor[c.id];
              const dim=!scenario&&!teamHL&&((ac&&!isS&&!isC)||(adb&&!isDbC)||(sIds&&!sIds.has(c.id)));
              const scDim=scenario&&!isSc;const tDim=teamHL&&!isTHL;
              return <g key={c.id} onClick={e=>si(()=>{setSel(sel===c.id?null:c.id);setSL(null);setSD(null);setSDb(null);setScenario(null);setTeamHL(null)},e)} style={{cursor:"pointer"}} opacity={dim||scDim||tDim?.07:1}>
                <rect x={p.x} y={p.y} width={p.w} height={p.h} rx={5} fill={isScCur?"#4ecdc430":isSc?"#4ecdc415":isS?O+"30":isC?O+"12":isDbC?(hc||CE)+"15":isTHL?(tc||"#888")+"20":CD} stroke={isScCur?"#4ecdc4":isSc?"#4ecdc466":isS?O:isC?O+"66":isDbC?(hc||CE)+"55":isTHL?(tc||"#888"):BD} strokeWidth={isS||isScCur?2:isC||isDbC||isSc||isTHL?1.5:1}/>
                {/* Team color indicator */}
                {tc&&<rect x={p.x} y={p.y} width={4} height={p.h} rx={2} fill={tc} opacity={.7}/>}
                <text x={p.x+8} y={p.y+14} fontSize={9} fontWeight={700} fill={isScCur?"#4ecdc4":isSc?"#4ecdc4":isS?TX:isC?O:isDbC?(hc||CE):isTHL?(tc||"#888"):TM}>{c.n}</text>
                <text x={p.x+8} y={p.y+25} fontSize={7} fill={TD}>{c.s}</text>
                <rect x={p.x+p.w-34} y={p.y+2} width={32} height={10} rx={3} fill={SC[c.sk]+"22"} stroke={SC[c.sk]+"44"} strokeWidth={.5}/>
                <text x={p.x+p.w-18} y={p.y+10} fontSize={6} fontWeight={700} fill={SC[c.sk]} textAnchor="middle">{SL[c.sk]}</text>
                {isScCur&&<text x={p.x+p.w/2} y={p.y-4} fontSize={10} fontWeight={800} fill="#4ecdc4" textAnchor="middle">▼</text>}
              </g>})}

            <g transform={`translate(${LP},${POS["L_data"]?POS["L_data"].y+POS["L_data"].h+14:500})`}>
              <rect x={0} y={0} width={380} height={18} rx={4} fill={CD+"dd"} stroke={BD}/>
              {[{c:O,l:"Lib",x:6},{c:CE,l:"PERM",x:36},{c:CE2,l:"RUN",x:74},{c:CC,l:"CH",x:106},{c:CS,l:"SQ",x:132},{c:CR,l:"RDB",x:156},{c:"#4ecdc4",l:"Сценарий",x:186}].map((x,i)=><g key={i}><rect x={x.x} y={6} width={8} height={3} rx={1} fill={x.c}/><text x={x.x+10} y={11} fontSize={6} fill={TM}>{x.l}</text></g>)}
            </g>
          </g>
        </svg>

        {tt&&<div className="tt" style={{left:tt.x,top:tt.y}}>{tt.text}</div>}

        <div className="top-bar">
          <input value={search} onChange={e=>{setSearch(e.target.value);setScenario(null);setTeamHL(null)}} placeholder="🔍 Поиск..." style={{width:140}}/>
          <select value={scenario||""} onChange={e=>{setScenario(e.target.value||null);setScStep(0);setSel(null);setSDb(null);setTeamHL(null)}}><option value="">📋 Сценарии</option>{SCENARIOS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
          {!showTeams&&<button onClick={()=>setShowTeams(true)}>👥 Команды</button>}
        </div>

        {activeSc&&<div className="sc-panel" style={{right:showSB?390:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,color:"#4ecdc4",fontWeight:700}}>{activeSc.name}</span>
            <button onClick={()=>setScenario(null)} style={{background:"none",border:"none",color:TD,cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:6}}>
            <button onClick={()=>setScStep(Math.max(0,scStep-1))} disabled={scStep===0} style={{padding:"3px 8px",borderRadius:5,border:"1px solid "+BD,background:CD,color:TX,cursor:"pointer",fontSize:10,opacity:scStep===0?.4:1}}>←</button>
            <span style={{fontSize:10,color:TM}}>{scStep+1}/{activeSc.steps.length}</span>
            <button onClick={()=>setScStep(Math.min(activeSc.steps.length-1,scStep+1))} disabled={scStep>=activeSc.steps.length-1} style={{padding:"3px 8px",borderRadius:5,border:"1px solid "+BD,background:CD,color:TX,cursor:"pointer",fontSize:10,opacity:scStep>=activeSc.steps.length-1?.4:1}}>→</button>
          </div>
          <div style={{background:BG,borderRadius:5,padding:"6px 10px",border:"1px solid #4ecdc433"}}><div style={{fontSize:11,color:"#4ecdc4",fontWeight:700}}>{activeSc.steps[scStep].label}</div><div style={{fontSize:11,color:TX,marginTop:2}}>{activeSc.steps[scStep].desc}</div></div>
          <div style={{display:"flex",gap:2,marginTop:6}}>{activeSc.steps.map((s,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=scStep?"#4ecdc4":BD}}/>)}</div>
        </div>}

        <div className="zoom-bar">
          <button onClick={()=>setZoom(Math.min(2.5,zoom*1.2))}>+</button>
          <button onClick={()=>setZoom(Math.max(.12,zoom/1.2))}>−</button>
          <button onClick={()=>{setZoom(.42);setPan({x:0,y:0})}}>⟲</button>
        </div>
      </div>

      {showSB&&<div className="sidebar">
        <div style={{display:"flex",justifyContent:"flex-end",padding:"6px 10px 0"}}><button onClick={()=>{setSel(null);setSL(null);setSD(null);setSDb(null)}} style={{background:"none",border:"none",color:TD,cursor:"pointer",fontSize:16}}>✕</button></div>
        <div style={{flex:1,overflowY:"auto"}}>{side}</div>
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
